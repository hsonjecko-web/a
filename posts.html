<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المنشورات - تطبيقي الاجتماعي</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
:root {
--primary-blue: #1a73e8; --primary-blue-dark: #1557b0; --white: #ffffff;
--bg-light: #f0f4f8; --bg-dark: #0d1117;
--card-light: rgba(255, 255, 255, 0.7); --card-dark: rgba(13, 17, 23, 0.8);
--border-light: rgba(26, 115, 232, 0.2); --border-dark: rgba(255, 255, 255, 0.1);
--text-primary-light: #1f2937; --text-secondary-light: #6b7280;
--text-primary-dark: #f9fafb; --text-secondary-dark: #9ca3af;
--shadow: 0 8px 32px rgba(31, 38, 135, 0.15); --blur: blur(12px);
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
body { background: var(--bg-light); min-height: 100vh; color: var(--text-primary-light); overflow-x: hidden; padding-bottom: 100px; }
[data-theme="dark"] body { background: var(--bg-dark); color: var(--text-primary-dark); }

.header { position: sticky; top: 0; z-index: 1000; padding: 12px 20px; background: var(--card-light); backdrop-filter: var(--blur); border-bottom: 1px solid var(--border-light); box-shadow: var(--shadow); }
[data-theme="dark"] .header { background: var(--card-dark); border-bottom: 1px solid var(--border-dark); box-shadow: var(--shadow-dark); }
.header-content { display: flex; justify-content: space-between; align-items: center; }
.user-info { display: flex; align-items: center; gap: 12px; cursor: pointer; }
.user-avatar { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--primary-blue); object-fit: cover; }
.user-name { font-weight: 700; font-size: 16px; }
.header-actions { display: flex; gap: 10px; }
.theme-toggle { width: 48px; height: 26px; background: var(--primary-blue); border-radius: 13px; cursor: pointer; padding: 3px; position: relative; }
[data-theme="dark"] .theme-toggle { background: #374151; }
.theme-slider { width: 20px; height: 20px; background: white; border-radius: 50%; position: absolute; right: 3px; transition: transform 0.3s ease; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--primary-blue); }
[data-theme="dark"] .theme-slider { transform: translateX(-22px); color: #374151; }

.posts-header { padding: 15px 20px; display: flex; gap: 10px; }
.search-box { flex: 1; position: relative; }
.search-box input { width: 100%; padding: 14px 20px 14px 45px; border: 1px solid var(--border-light); border-radius: 16px; background: var(--card-light); backdrop-filter: var(--blur); font-size: 14px; }
[data-theme="dark"] .search-box input { background: var(--card-dark); border-color: var(--border-dark); }
.search-box i { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-secondary-light); }
.btn-create { padding: 14px 20px; background: var(--primary-blue); color: white; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; }
.btn-create:hover { background: var(--primary-blue-dark); }

.posts-container { padding: 0 20px; }
.post-card { background: var(--card-light); backdrop-filter: var(--blur); border: 1px solid var(--border-light); border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
[data-theme="dark"] .post-card { background: var(--card-dark); border-color: var(--border-dark); box-shadow: var(--shadow-dark); }
.post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.post-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--primary-blue); }
.post-author { font-weight: 700; font-size: 14px; }
.post-time { font-size: 11px; color: var(--text-secondary-light); }
.post-content { line-height: 1.6; font-size: 14px; margin-bottom: 12px; }
.post-image { width: 100%; border-radius: 12px; margin-bottom: 12px; max-height: 400px; object-fit: cover; }
.post-actions { display: flex; justify-content: space-between; padding-top: 12px; border-top: 1px solid var(--border-light); }
[data-theme="dark"] .post-actions { border-color: var(--border-dark); }
.post-action { display: flex; align-items: center; gap: 5px; color: var(--text-secondary-light); font-size: 13px; cursor: pointer; }
.post-action:hover, .post-action.active { color: var(--primary-blue); }
.post-action.liked { color: #ea4335; }
.post-action.favorited { color: #f59e0b; }
.post-menu { position: relative; cursor: pointer; }
.post-dropdown { position: absolute; top: 100%; right: 0; background: var(--card-light); border: 1px solid var(--border-light); border-radius: 12px; padding: 8px 0; min-width: 150px; display: none; z-index: 100; }
[data-theme="dark"] .post-dropdown { background: var(--card-dark); border-color: var(--border-dark); }
.post-dropdown.show { display: block; }
.post-dropdown button { width: 100%; padding: 10px 16px; text-align: right; background: none; border: none; font-size: 13px; cursor: pointer; }
.post-dropdown button:hover { background: rgba(26,115,232,0.1); }

.comments-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-light); display: none; }
[data-theme="dark"] .comments-section { border-color: var(--border-dark); }
.comments-section.show { display: block; }
.comment { display: flex; gap: 10px; margin-bottom: 12px; }
.comment-avatar { width: 32px; height: 32px; border-radius: 50%; }
.comment-content { flex: 1; background: rgba(26,115,232,0.08); border-radius: 12px; padding: 10px 14px; }
[data-theme="dark"] .comment-content { background: rgba(26,115,232,0.2); }
.comment-author { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
.comment-text { font-size: 13px; }
.comment-form { display: flex; gap: 10px; margin-top: 12px; }
.comment-form input { flex: 1; padding: 10px 16px; border: 1px solid var(--border-light); border-radius: 20px; background: rgba(255,255,255,0.6); font-size: 13px; }
[data-theme="dark"] .comment-form input { background: rgba(255,255,255,0.1); border-color: var(--border-dark); }
.comment-form button { padding: 10px 20px; background: var(--primary-blue); color: white; border: none; border-radius: 20px; font-weight: 700; cursor: pointer; }

.create-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
.create-modal.active { display: flex; }
.create-card { background: var(--card-light); backdrop-filter: blur(20px); border: 1px solid var(--border-light); border-radius: 24px; padding: 24px; width: 100%; max-width: 500px; }
[data-theme="dark"] .create-card { background: var(--card-dark); border-color: var(--border-dark); }
.create-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.create-header h3 { font-size: 18px; font-weight: 800; }
.close-create { width: 32px; height: 32px; border-radius: 50%; background: rgba(234,67,53,0.1); border: none; color: #ea4335; cursor: pointer; }
.create-form textarea { width: 100%; min-height: 120px; padding: 16px; border: 1px solid var(--border-light); border-radius: 16px; background: rgba(255,255,255,0.6); font-size: 14px; resize: none; margin-bottom: 16px; }
[data-theme="dark"] .create-form textarea { background: rgba(255,255,255,0.1); border-color: var(--border-dark); }
.image-preview { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 16px; }
.preview-item { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; border: 2px solid var(--primary-blue); }
.add-image { width: 80px; height: 80px; border-radius: 12px; border: 2px dashed var(--border-light); display: flex; align-items: center; justify-content: center; color: var(--text-secondary-light); cursor: pointer; }
.add-image:hover { border-color: var(--primary-blue); color: var(--primary-blue); }
.create-actions { display: flex; gap: 10px; }
.btn-cancel { flex: 1; padding: 14px; border: 1px solid var(--border-light); border-radius: 12px; background: transparent; cursor: pointer; }
.btn-publish { flex: 1; padding: 14px; border: none; border-radius: 12px; background: var(--primary-blue); color: white; font-weight: 700; cursor: pointer; }

.footer-glass { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px 20px 25px; background: var(--card-light); backdrop-filter: var(--blur); border-top: 1px solid var(--border-light); box-shadow: 0 -4px 20px rgba(0,0,0,0.1); z-index: 999; display: flex; justify-content: center; }
[data-theme="dark"] .footer-glass { background: var(--card-dark); border-color: var(--border-dark); box-shadow: 0 -4px 20px rgba(0,0,0,0.3); }
.footer-nav { display: flex; justify-content: space-around; align-items: flex-end; width: 100%; max-width: 500px; }
.footer-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-secondary-light); text-decoration: none; font-size: 11px; font-weight: 600; padding: 8px 16px; border-radius: 16px; }
[data-theme="dark"] .footer-item { color: var(--text-secondary-dark); }
.footer-item i { font-size: 20px; }
.footer-item.active { color: var(--primary-blue); transform: translateY(-12px); background: var(--white); box-shadow: 0 8px 20px rgba(26, 115, 232, 0.25); }
[data-theme="dark"] .footer-item.active { color: var(--primary-blue-light); background: rgba(26, 115, 232, 0.2); }

.toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-light); border: 1px solid var(--border-light); border-radius: 12px; padding: 16px 24px; font-weight: 700; z-index: 10000; display: none; }
[data-theme="dark"] .toast { background: var(--card-dark); border-color: var(--border-dark); }
.toast.show { display: block; }
</style>
</head>
<body>

<header class="header">
  <div class="header-content">
    <div class="user-info" onclick="window.location.href='profile.html'">
      <img src="" class="user-avatar" id="header-avatar">
      <span class="user-name" id="header-name">...</span>
    </div>
    <div class="header-actions">
      <div class="theme-toggle" onclick="toggleTheme()"><div class="theme-slider"><i class="fas fa-sun"></i></div></div>
    </div>
  </div>
</header>

<div class="posts-header">
  <div class="search-box">
    <input type="text" id="search-posts" placeholder="بحث في المنشورات..." onkeyup="searchPosts()">
    <i class="fas fa-search"></i>
  </div>
  <button class="btn-create" onclick="openCreateModal()"><i class="fas fa-plus"></i> جديد</button>
</div>

<div class="posts-container" id="posts-container">
  <p style="padding:40px;text-align:center;color:var(--text-secondary-light)">جاري التحميل...</p>
</div>

<div class="create-modal" id="create-modal">
  <div class="create-card">
    <div class="create-header">
      <h3>إنشاء منشور جديد</h3>
      <button class="close-create" onclick="closeCreateModal()"><i class="fas fa-times"></i></button>
    </div>
    <form class="create-form" onsubmit="createPost(event)">
      <textarea id="post-content" placeholder="اكتب شيئاً..." required></textarea>
      <div class="image-preview" id="image-preview"></div>
      <label class="add-image" for="post-image">
        <i class="fas fa-image"></i>
        <input type="file" id="post-image" accept="image/*" style="display:none" onchange="previewImages(event)">
      </label>
      <div class="create-actions">
        <button type="button" class="btn-cancel" onclick="closeCreateModal()">إلغاء</button>
        <button type="submit" class="btn-publish">نشر</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer class="footer-glass">
  <nav class="footer-nav">
    <a href="home.html" class="footer-item"><i class="fas fa-home"></i><span>الرئيسية</span></a>
    <a href="posts.html" class="footer-item active"><i class="fas fa-newspaper"></i><span>المنشورات</span></a>
    <a href="friends.html" class="footer-item"><i class="fas fa-user-friends"></i><span>الأصدقاء</span></a>
    <a href="chat.html" class="footer-item"><i class="fas fa-comment-dots"></i><span>الدردشة</span></a>
    <a href="profile.html" class="footer-item"><i class="fas fa-user"></i><span>الملف</span></a>
  </nav>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, getDocs, doc, updateDoc, arrayUnion, arrayRemove, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7Ya_TIQj4_VFnAWydj5Xzq2zFjJsN-a4",
  authDomain: "cahtai.firebaseapp.com",
  databaseURL: "https://cahtai-default-rtdb.firebaseio.com",
  projectId: "cahtai",
  storageBucket: "cahtai.firebasestorage.app",
  messagingSenderId: "325594152614",
  appId: "1:325594152614:web:cf5fb37660a0c33b5afe67",
  measurementId: "G-9VMJ193S9R"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = JSON.parse(localStorage.getItem('currentUser'));
if(!currentUser) { window.location.href = 'index.html'; }

document.getElementById('header-avatar').src = currentUser.avatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(currentUser.name);
document.getElementById('header-name').textContent = currentUser.name.split(' ')[0];

window.toggleTheme = function() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  const icon = document.querySelector('.theme-slider i');
  icon.className = next === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
  localStorage.setItem('theme', next);
}

window.showToast = function(msg) {
  const t = document.getElementById('toast');
  if(t) { t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
}

async function loadPosts() {
  const container = document.getElementById('posts-container');
  try {
    const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
    const snapshot = await getDocs(q);
    
    if(snapshot.empty) {
      container.innerHTML = '<p style="padding:40px;text-align:center;color:var(--text-secondary-light)">لا توجد منشورات بعد</p>';
      return;
    }
    
    container.innerHTML = snapshot.docs.map(docSnap => {
      const post = docSnap.data();
      const isOwner = post.userId === currentUser.id;
      const liked = post.likes?.includes(currentUser.id);
      const favorited = post.favorites?.includes(currentUser.id);
      
      return `
      <div class="post-card" data-id="${docSnap.id}">
        <div class="post-header">
          <img src="${post.userAvatar}" class="post-avatar">
          <div style="flex:1">
            <div class="post-author">${post.userName}</div>
            <div class="post-time">${formatTime(post.createdAt)}</div>
          </div>
          ${isOwner ? `<div class="post-menu" onclick="togglePostMenu('${docSnap.id}')">
            <i class="fas fa-ellipsis-v"></i>
            <div class="post-dropdown" id="menu-${docSnap.id}">
              <button onclick="editPost('${docSnap.id}')"><i class="fas fa-edit"></i> تعديل</button>
              <button onclick="deletePost('${docSnap.id}')"><i class="fas fa-trash"></i> حذف</button>
            </div>
          </div>` : ''}
        </div>
        <div class="post-content">${post.content}</div>
        ${post.image ? `<img src="${post.image}" class="post-image">` : ''}
        <div class="post-actions">
          <div class="post-action ${liked ? 'liked' : ''}" onclick="toggleLike('${docSnap.id}')">
            <i class="fas fa-heart"></i><span>${post.likes?.length || 0}</span>
          </div>
          <div class="post-action" onclick="toggleComments('${docSnap.id}')">
            <i class="fas fa-comment"></i><span>${post.comments?.length || 0}</span>
          </div>
          <div class="post-action ${favorited ? 'favorited' : ''}" onclick="toggleFavorite('${docSnap.id}')">
            <i class="fas fa-bookmark"></i>
          </div>
          <div class="post-action" onclick="sharePost('${docSnap.id}')">
            <i class="fas fa-share"></i>
          </div>
        </div>
        <div class="comments-section" id="comments-${docSnap.id}">
          ${post.comments?.map(c => `
            <div class="comment">
              <img src="${c.avatar}" class="comment-avatar">
              <div class="comment-content">
                <div class="comment-author">${c.userName}</div>
                <div class="comment-text">${c.text}</div>
              </div>
            </div>
          `).join('') || ''}
          <form class="comment-form" onsubmit="addComment(event, '${docSnap.id}')">
            <input type="text" placeholder="اكتب تعليقاً..." required>
            <button type="submit">إرسال</button>
          </form>
        </div>
      </div>`;
    }).join('');
  } catch(error) {
    console.error(error);
    container.innerHTML = '<p style="padding:40px;text-align:center;color:#ea4335">خطأ في التحميل</p>';
  }
}

window.searchPosts = function() {
  const term = document.getElementById('search-posts').value.toLowerCase();
  document.querySelectorAll('.post-card').forEach(card => {
    const content = card.querySelector('.post-content')?.textContent.toLowerCase() || '';
    card.style.display = content.includes(term) ? 'block' : 'none';
  });
}

window.openCreateModal = function() { document.getElementById('create-modal').classList.add('active'); }
window.closeCreateModal = function() { 
  document.getElementById('create-modal').classList.remove('active');
  document.getElementById('post-content').value = '';
  document.getElementById('image-preview').innerHTML = '';
}

window.previewImages = function(e) {
  const preview = document.getElementById('image-preview');
  preview.innerHTML = '';
  Array.from(e.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = document.createElement('img');
      img.src = ev.target.result;
      img.className = 'preview-item';
      preview.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
}

window.createPost = async function(e) {
  e.preventDefault();
  const content = document.getElementById('post-content').value;
  const imageFile = document.getElementById('post-image').files[0];
  
  let imageUrl = '';
  if(imageFile) {
    imageUrl = URL.createObjectURL(imageFile);
  }
  
  await addDoc(collection(db, 'posts'), {
    userId: currentUser.id,
    userName: currentUser.name,
    userAvatar: currentUser.avatar,
    content: content,
    image: imageUrl,
    likes: [],
    favorites: [],
    comments: [],
    createdAt: serverTimestamp()
  });
  
  showToast('تم نشر المنشور ✓');
  closeCreateModal();
  loadPosts();
}

window.toggleLike = async function(postId) {
  const postRef = doc(db, 'posts', postId);
  const postDoc = await getDocs(query(collection(db, 'posts'), orderBy('createdAt', 'desc')));
  const post = postDoc.docs.find(d => d.id === postId)?.data();
  
  if(post?.likes?.includes(currentUser.id)) {
    await updateDoc(postRef, { likes: arrayRemove(currentUser.id) });
  } else {
    await updateDoc(postRef, { likes: arrayUnion(currentUser.id) });
  }
  loadPosts();
}

window.toggleFavorite = async function(postId) {
  const postRef = doc(db, 'posts', postId);
  const postDoc = await getDocs(query(collection(db, 'posts'), orderBy('createdAt', 'desc')));
  const post = postDoc.docs.find(d => d.id === postId)?.data();
  
  if(post?.favorites?.includes(currentUser.id)) {
    await updateDoc(postRef, { favorites: arrayRemove(currentUser.id) });
    showToast('تمت الإزالة من المفضلة');
  } else {
    await updateDoc(postRef, { favorites: arrayUnion(currentUser.id) });
    showToast('تمت الإضافة للمفضلة ✓');
  }
  loadPosts();
}

window.toggleComments = function(postId) {
  const el = document.getElementById(`comments-${postId}`);
  el.classList.toggle('show');
}

window.addComment = async function(e, postId) {
  e.preventDefault();
  const input = e.target.querySelector('input');
  const text = input.value.trim();
  if(!text) return;
  
  const postRef = doc(db, 'posts', postId);
  await updateDoc(postRef, {
    comments: arrayUnion({
      userId: currentUser.id,
      userName: currentUser.name,
      avatar: currentUser.avatar,
      text: text,
      createdAt: serverTimestamp()
    })
  });
  
  input.value = '';
  loadPosts();
}

window.deletePost = async function(postId) {
  if(confirm('هل تريد حذف هذا المنشور؟')) {
    await deleteDoc(doc(db, 'posts', postId));
    showToast('تم الحذف ✓');
    loadPosts();
  }
}

window.editPost = function(postId) { showToast('خاصية التعديل قريباً'); }
window.sharePost = function(postId) { showToast('تم نسخ رابط المشاركة'); }
window.togglePostMenu = function(id) {
  document.querySelectorAll('.post-dropdown').forEach(d => {
    if(d.id !== `menu-${id}`) d.classList.remove('show');
  });
  document.getElementById(`menu-${id}`).classList.toggle('show');
}

function formatTime(ts) {
  if(!ts) return '';
  const date = ts.toDate ? ts.toDate() : new Date(ts);
  const now = new Date();
  const diff = Math.floor((now - date) / 1000);
  if(diff < 60) return 'الآن';
  if(diff < 3600) return `منذ ${Math.floor(diff/60)} دقيقة`;
  if(diff < 86400) return `منذ ${Math.floor(diff/3600)} ساعة`;
  return `منذ ${Math.floor(diff/86400)} يوم`;
}

window.addEventListener('load', () => {
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  const icon = document.querySelector('.theme-slider i');
  icon.className = saved === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
  loadPosts();
});

document.addEventListener('click', (e) => {
  if(!e.target.closest('.post-menu')) {
    document.querySelectorAll('.post-dropdown').forEach(d => d.classList.remove('show'));
  }
});
</script>
</body>
</html>
