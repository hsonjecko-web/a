<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة إدارة المستخدمين - نظام التميز</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <style>
    :root {
      --bg-main: linear-gradient(135deg, #111827 0%, #0f172a 100%);
      --glass-bg: rgba(30, 41, 59, 0.6); --glass-border: rgba(255, 255, 255, 0.1);
      --text-primary: #f8fafc; --text-secondary: #94a3b8;
      --accent-blue: #3b82f6; --accent-green: #22c55e; --accent-red: #ef4444; --accent-purple: #a855f7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
    body { min-height: 100vh; background: var(--bg-main); color: var(--text-primary); }
    
    .header { background: rgba(15,23,42,0.9); backdrop-filter: blur(20px); padding: 20px; text-align: center; border-bottom: 1px solid var(--glass-border); }
    .header h1 { font-size: 1.8rem; margin-bottom: 8px; }
    .header p { color: var(--text-secondary); }
    
    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    
    /* Login Form */
    .login-section { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 40px; max-width: 400px; margin: 0 auto 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; margin-bottom: 8px; font-weight: 600; }
    .form-input { width: 100%; padding: 14px; background: rgba(15,23,42,0.8); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-primary); font-size: 1rem; }
    .form-input:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(168,85,247,0.2); }
    .login-btn { width: 100%; padding: 14px; background: var(--accent-purple); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .login-btn:hover { background: #9333ea; transform: translateY(-2px); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    
    /* Dashboard */
    .dashboard-section { display: none; }
    .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
    .logout-btn { background: var(--accent-red); color: white; padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; }
    
    /* Create User Form */
    .create-form { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 25px; margin-bottom: 30px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
    @media (max-width: 640px) { .form-row { grid-template-columns: 1fr; } }
    .create-btn { background: var(--accent-green); color: white; padding: 12px 30px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
    
    /* Users Table */
    .users-table { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; overflow: hidden; }
    .table-header { background: rgba(15,23,42,0.8); padding: 15px 20px; font-weight: 600; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 150px; gap: 10px; }
    @media (max-width: 768px) { .table-header { grid-template-columns: 1fr 1fr 100px; font-size: 0.9rem; } }
    .table-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 150px; gap: 10px; padding: 15px 20px; border-bottom: 1px solid var(--glass-border); transition: background 0.2s; }
    .table-row:hover { background: rgba(59,130,246,0.1); }
    .table-row:last-child { border-bottom: none; }
    @media (max-width: 768px) { .table-row { grid-template-columns: 1fr 1fr 100px; } }
    .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
    .status-active { background: rgba(34,197,94,0.2); color: var(--accent-green); }
    .status-inactive { background: rgba(239,68,68,0.2); color: var(--accent-red); }
    .action-btn { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85rem; margin: 0 2px; transition: all 0.2s; }
    .btn-toggle { background: var(--accent-purple); color: white; width: 100%; }
    .btn-delete { background: var(--accent-red); color: white; }
    .btn-reset { background: var(--accent-blue); color: white; }
    
    .alert { padding: 15px 20px; margin-bottom: 20px; border-radius: 10px; font-weight: 500; display: none; }
    .alert-success { background: rgba(34,197,94,0.15); color: var(--accent-green); border: 1px solid rgba(34,197,94,0.3); }
    .alert-error { background: rgba(239,68,68,0.15); color: var(--accent-red); border: 1px solid rgba(239,68,68,0.3); }
    
    .no-users { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
    
    .search-box { margin-bottom: 20px; }
    .search-input { width: 100%; max-width: 300px; padding: 12px; background: rgba(15,23,42,0.8); border: 1px solid var(--glass-border); border-radius: 10px; color: var(--text-primary); }
  </style>
</head>
<body>
  <header class="header">
    <h1><span class="material-icons-round" style="color: var(--accent-purple); vertical-align: middle;">admin_panel_settings</span> لوحة إدارة المستخدمين</h1>
    <p>نظام التميز - إدارة كاملة للحسابات</p>
  </header>

  <div class="container">
    <!-- Super Admin Login -->
    <div id="loginSection">
      <div class="login-section">
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label">اسم المستخدم (الأدمن)</label>
            <input type="text" class="form-input" id="adminUser" placeholder="admin" value="admin">
          </div>
          <div class="form-group">
            <label class="form-label">كلمة المرور</label>
            <input type="password" class="form-input" id="adminPass" placeholder="******">
          </div>
          <button type="submit" class="login-btn">دخول لوحة الإدارة</button>
        </form>
        <div id="loginAlert" class="alert"></div>
      </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="dashboardSection" class="dashboard-section">
      <div class="dashboard-header">
        <h2>إدارة الحسابات <span id="userCount">(0 مستخدم)</span></h2>
        <button class="logout-btn" onclick="logout()">خروج <span class="material-icons-round">logout</span></button>
      </div>
      
      <div id="alert" class="alert"></div>
      
      <!-- Create New User -->
      <div class="create-form">
        <h3>إنشاء مستخدم جديد</h3>
        <form id="createUserForm" class="form-row">
          <div class="form-group">
            <label>الاسم الكامل</label>
            <input type="text" class="form-input" id="newName" placeholder="أحمد محمد" required>
          </div>
          <div class="form-group">
            <label>اسم المستخدم (يوزر نيم)</label>
            <input type="text" class="form-input" id="newUsername" placeholder="user123" required>
          </div>
          <div class="form-group">
            <label>كلمة المرور</label>
            <input type="password" class="form-input" id="newPassword" placeholder="password123" minlength="4" required>
          </div>
          <div class="form-group">
            <label>رقم الهاتف (اختياري)</label>
            <input type="tel" class="form-input" id="newPhone" placeholder="077xxxxxxxx">
          </div>
          <button type="submit" class="create-btn">إنشاء المستخدم <span class="material-icons-round">person_add</span></button>
        </form>
      </div>
      
      <!-- Users Search -->
      <div class="search-box">
        <input type="text" class="search-input" id="searchUsers" placeholder="ابحث بالاسم أو اليوزر...">
      </div>
      
      <!-- Users List -->
      <div class="users-table">
        <div class="table-header">
          <span>الاسم / اليوزر</span>
          <span>الهاتف</span>
          <span>الرقم</span>
          <span>تاريخ الإنشاء</span>
          <span>الحالة</span>
        </div>
        <div id="usersList">
          <div class="no-users">
            <span class="material-icons-round" style="font-size: 64px; opacity: 0.3;">group</span>
            <p>لا يوجد مستخدمين</p>
            <p>أضف مستخدماً جديداً من الأعلى</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>

    // Live server + local support
    const API_BASE = window.location.hostname === 'localhost' ? 'api' : 'https://our-qiq.com/api';

    
    // Super Admin Credentials
    const SUPERADMIN_USER = 'admin';
    const SUPERADMIN_PASS = '002200';
    
    let filteredUsers = [];
    
    // Show Alert
    function showAlert(message, type = 'success') {
      const alert = document.getElementById('alert') || document.getElementById('loginAlert');
      alert.textContent = message;
      alert.className = `alert alert-${type}`;
      alert.style.display = 'block';
      setTimeout(() => alert.style.display = 'none', 5000);
    }
    

    // Super Admin Login - Server Session
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const user = document.getElementById('adminUser').value.trim();
      const pass = document.getElementById('adminPass').value;
      
      try {
        const res = await fetch(`${API_BASE}/superadmin_login.php`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          credentials: 'include',
          body: JSON.stringify({username: user, password: pass})
        });
        const result = await res.json();
        
        if (result.success) {
          sessionStorage.setItem('superadmin', 'true');
          document.getElementById('loginSection').style.display = 'none';
          document.getElementById('dashboardSection').style.display = 'block';
          loadUsers();
        } else {
          showAlert(result.message || '❌ خطأ في تسجيل الدخول', 'error');
        }
      } catch (err) {
        showAlert('❌ خطأ في الاتصال بالسيرفر', 'error');
      }
    });

    
    // Logout
    function logout() {
      sessionStorage.removeItem('superadmin');
      document.getElementById('dashboardSection').style.display = 'none';
      document.getElementById('loginSection').style.display = 'block';
      document.getElementById('loginForm').reset();
      document.getElementById('adminUser').value = 'admin';
    }
    
    // Load Users
    async function loadUsers(search = '') {
      try {
        const res = await fetch(`${API_BASE}/users.php`, { credentials: 'include' });
        const result = await res.json();
        
        if (!result.success) {
          showAlert('خطأ في جلب المستخدمين', 'error');
          return;
        }
        
        filteredUsers = result.users.filter(u => 
          u.name.toLowerCase().includes(search.toLowerCase()) ||
          u.username.toLowerCase().includes(search.toLowerCase())
        );
        
        renderUsers();
        document.getElementById('userCount').textContent = `(${filteredUsers.length} مستخدم)`;
      } catch (err) {
        showAlert('خطأ في الاتصال بالسيرفر', 'error');
      }
    }
    
    // Render Users Table
    function renderUsers() {
      const container = document.getElementById('usersList');
      if (filteredUsers.length === 0) {
        container.innerHTML = `
          <div class="no-users">
            <span class="material-icons-round" style="font-size: 64px; opacity: 0.3;">search_off</span>
            <p>لا توجد نتائج للبحث</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = filteredUsers.map(user => `
        <div class="table-row">
          <div>
            <div style="font-weight: 600; margin-bottom: 4px;">${user.name}</div>
            <div style="font-size: 0.9rem; color: var(--text-secondary);">${user.username}</div>
          </div>
          <div>${user.phone || '-'}</div>
          <div>#${user.id}</div>
          <div>${new Date(user.created_at).toLocaleDateString('ar-SA')}</div>
          <div>
            <span class="status-badge status-${user.status}">${user.status === 'active' ? '✅ نشط' : '⏸️ معطل'}</span>
          </div>
          <div style="display: flex; gap: 5px; flex-wrap: wrap;">
            <button class="action-btn btn-toggle" onclick="toggleStatus(${user.id}, '${user.status}')">
              ${user.status === 'active' ? 'تعطيل' : 'تفعيل'}
            </button>
            <button class="action-btn btn-reset" onclick="resetPassword(${user.id})">إعادة تعيين الباسورد</button>
            <button class="action-btn btn-delete" onclick="deleteUser(${user.id})">حذف</button>
          </div>
        </div>
      `).join('');
    }
    
    // Create User
    document.getElementById('createUserForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        name: document.getElementById('newName').value.trim(),
        username: document.getElementById('newUsername').value.trim(),
        password: document.getElementById('newPassword').value,
        phone: document.getElementById('newPhone').value.trim(),
        role: 'user'
      };
      
      try {
        const res = await fetch(`${API_BASE}/create_user.php`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(data)
        });
        const result = await res.json();
        
        if (result.success) {
          showAlert(`✅ تم إنشاء المستخدم ${data.username} بنجاح!`);
          e.target.reset();
          loadUsers();
        } else {
          showAlert('❌ ' + (result.message || 'خطأ في الإنشاء'), 'error');
        }
      } catch (err) {
        showAlert('❌ خطأ في الاتصال بالسيرفر', 'error');
      }
    });
    
    // Toggle Status
    async function toggleStatus(id, currentStatus) {
      if (!confirm(`هل تريد ${currentStatus === 'active' ? 'تعطيل' : 'تفعيل'} هذا الحساب؟`)) return;
      
      const newStatus = currentStatus === 'active' ? 'inactive' : 'active';
      try {
        const res = await fetch(`${API_BASE}/update_user.php`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ id, status: newStatus })
        });
        const result = await res.json();
        
        if (result.success) {
          showAlert(`✅ تم ${newStatus === 'active' ? 'تفعيل' : 'تعطيل'} الحساب`);
          loadUsers();
        } else {
          showAlert('❌ ' + (result.message || 'خطأ'), 'error');
        }
      } catch (err) {
        showAlert('❌ خطأ في الاتصال', 'error');
      }
    }
    
    // Reset Password (simple to '1234')
    async function resetPassword(id) {
      if (!confirm('هل تريد إعادة تعيين كلمة المرور إلى "1234"؟')) return;
      try {
        const res = await fetch(`${API_BASE}/update_user.php`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ id, password: '1234' })
        });
        const result = await res.json();
        if (result.success) {
          showAlert('✅ تم إعادة تعيين كلمة المرور إلى 1234');
          loadUsers();
        }
      } catch (err) {
        showAlert('❌ خطأ', 'error');
      }
    }
    
    // Delete User
    async function deleteUser(id) {
      if (!confirm('هل أنت متأكد من حذف هذا المستخدم نهائياً؟')) return;
      try {
        const res = await fetch(`${API_BASE}/users.php?id=${id}`, { method: 'DELETE', credentials: 'include' });
        const result = await res.json();
        if (result.success) {
          showAlert('✅ تم الحذف');
          loadUsers();
        }
      } catch (err) {
        showAlert('❌ خطأ', 'error');
      }
    }
    
    // Search
    document.getElementById('searchUsers').addEventListener('input', (e) => {
      loadUsers(e.target.value);
    });
    
    // Check if already logged in
    if (sessionStorage.getItem('superadmin')) {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('dashboardSection').style.display = 'block';
      loadUsers();
    }
  </script>
</body>
</html>
