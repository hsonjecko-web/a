<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>الأصدقاء - تطبيقي الاجتماعي</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
:root {
--primary-blue: #1a73e8; --primary-blue-dark: #1557b0; --primary-blue-light: #4a9eff;
--white: #ffffff; --bg-light: #f0f4f8; --bg-dark: #0d1117;
--card-light: rgba(255, 255, 255, 0.7); --card-dark: rgba(13, 17, 23, 0.8);
--border-light: rgba(26, 115, 232, 0.2); --border-dark: rgba(255, 255, 255, 0.1);
--text-primary-light: #1f2937; --text-secondary-light: #6b7280;
--text-primary-dark: #f9fafb; --text-secondary-dark: #9ca3af;
--shadow: 0 8px 32px rgba(31, 38, 135, 0.15); --shadow-dark: 0 8px 32px rgba(0, 0, 0, 0.4);
--blur: blur(12px); --success: #10b981; --warning: #f59e0b; --danger: #ea4335;
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg-light); min-height: 100vh; color: var(--text-primary-light); overflow-x: hidden; padding-bottom: 100px; transition: all 0.3s ease; }
[data-theme="dark"] body { background: var(--bg-dark); color: var(--text-primary-dark); }

/* Header */
.header { position: sticky; top: 0; z-index: 1000; padding: 12px 20px; background: var(--card-light); backdrop-filter: var(--blur); border-bottom: 1px solid var(--border-light); box-shadow: var(--shadow); }
[data-theme="dark"] .header { background: var(--card-dark); border-bottom: 1px solid var(--border-dark); box-shadow: var(--shadow-dark); }
.header-content { display: flex; justify-content: space-between; align-items: center; }
.user-info { display: flex; align-items: center; gap: 12px; cursor: pointer; }
.user-avatar { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--primary-blue); object-fit: cover; }
.user-name { font-weight: 700; font-size: 16px; color: inherit; }
.header-actions { display: flex; gap: 10px; align-items: center; }

/* Theme Toggle */
.theme-toggle { width: 48px; height: 26px; background: var(--primary-blue); border-radius: 13px; cursor: pointer; padding: 3px; position: relative; }
[data-theme="dark"] .theme-toggle { background: #374151; }
.theme-slider { width: 20px; height: 20px; background: white; border-radius: 50%; position: absolute; right: 3px; transition: transform 0.3s ease; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--primary-blue); }
[data-theme="dark"] .theme-slider { transform: translateX(-22px); color: #374151; }

/* Search */
.friends-header { padding: 15px 20px; display: flex; gap: 10px; align-items: center; }
.search-box { flex: 1; position: relative; }
.search-box input { width: 100%; padding: 14px 20px 14px 45px; border: 1px solid var(--border-light); border-radius: 16px; background: var(--card-light); backdrop-filter: var(--blur); font-size: 14px; color: inherit; }
[data-theme="dark"] .search-box input { background: var(--card-dark); border-color: var(--border-dark); }
.search-box i { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-secondary-light); }

/* Tabs */
.friends-tabs { display: flex; gap: 8px; padding: 0 20px 15px; overflow-x: auto; scrollbar-width: none; }
.friends-tabs::-webkit-scrollbar { display: none; }
.tab-btn { padding: 10px 20px; border: none; border-radius: 20px; background: var(--card-light); color: inherit; font-weight: 600; font-size: 13px; cursor: pointer; white-space: nowrap; transition: all 0.3s ease; position: relative; }
[data-theme="dark"] .tab-btn { background: var(--card-dark); }
.tab-btn.active { background: var(--primary-blue); color: white; }
.tab-badge { position: absolute; top: -4px; right: -4px; background: #ea4335; color: white; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

/* Friend Card */
.friends-container { padding: 0 20px; }
.friend-card { background: var(--card-light); backdrop-filter: var(--blur); border: 1px solid var(--border-light); border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow); transition: all 0.3s ease; cursor: pointer; }
[data-theme="dark"] .friend-card { background: var(--card-dark); border-color: var(--border-dark); box-shadow: var(--shadow-dark); }
.friend-card:hover { transform: translateY(-2px); border-color: var(--primary-blue); }
.friend-avatar { width: 56px; height: 56px; border-radius: 50%; border: 2px solid var(--primary-blue); object-fit: cover; }
.friend-info { flex: 1; min-width: 0; }
.friend-name { font-weight: 700; font-size: 15px; color: inherit; margin-bottom: 4px; }
.friend-username { font-size: 12px; color: var(--text-secondary-light); margin-bottom: 6px; }
[data-theme="dark"] .friend-username { color: var(--text-secondary-dark); }
.friend-meta { display: flex; gap: 12px; font-size: 11px; color: var(--text-secondary-light); }
[data-theme="dark"] .friend-meta { color: var(--text-secondary-dark); }
.friend-status { display: flex; align-items: center; gap: 4px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; }
.status-dot.offline { background: #9ca3af; }
.friend-actions { display: flex; flex-direction: column; gap: 8px; }
.action-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border-light); background: transparent; color: var(--primary-blue); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.3s ease; }
[data-theme="dark"] .action-btn { border-color: var(--border-dark); color: var(--primary-blue-light); }
.action-btn:hover { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }
.btn-message { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }
.btn-message:hover { background: var(--primary-blue-dark); }
.btn-accept { background: var(--success); color: white; border-color: var(--success); }
.btn-reject { background: var(--danger); color: white; border-color: var(--danger); }

/* Empty State */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary-light); }
.empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.empty-state p { font-size: 14px; }

/* User Modal */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: opacity 0.3s ease; }
.modal-overlay.active { display: flex; opacity: 1; }
.modal-card { background: var(--card-light); backdrop-filter: blur(20px); border: 1px solid var(--border-light); border-radius: 24px; padding: 24px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.25); transform: scale(0.9); transition: transform 0.3s ease; position: relative; }
[data-theme="dark"] .modal-card { background: var(--card-dark); border-color: var(--border-dark); }
.modal-overlay.active .modal-card { transform: scale(1); }
.close-modal { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: 50%; background: rgba(234, 67, 53, 0.1); border: none; color: #ea4335; cursor: pointer; font-size: 14px; transition: all 0.3s ease; }
.close-modal:hover { background: #ea4335; color: white; }
.modal-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary-blue); margin-bottom: 12px; }
.modal-name { font-size: 20px; font-weight: 800; color: inherit; margin-bottom: 4px; }
.modal-username { color: var(--text-secondary-light); font-size: 13px; margin-bottom: 20px; }
[data-theme="dark"] .modal-username { color: var(--text-secondary-dark); }
.modal-stats { display: flex; justify-content: space-around; margin: 20px 0; padding: 16px; background: rgba(26, 115, 232, 0.1); border-radius: 12px; border: 1px solid var(--border-light); }
[data-theme="dark"] .modal-stats { background: rgba(26, 115, 232, 0.2); border-color: var(--border-dark); }
.stat-item { text-align: center; }
.stat-number { font-size: 18px; font-weight: 800; color: var(--primary-blue); }
.stat-label { font-size: 11px; color: var(--text-secondary-light); margin-top: 4px; }
[data-theme="dark"] .stat-label { color: var(--text-secondary-dark); }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; }
.modal-btn { flex: 1; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; border: none; font-size: 13px; }
.btn-primary { background: var(--primary-blue); color: white; }
.btn-primary:hover { background: var(--primary-blue-dark); }
.btn-secondary { background: transparent; color: var(--primary-blue); border: 1px solid var(--border-light); }
[data-theme="dark"] .btn-secondary { color: var(--primary-blue-light); border-color: var(--border-dark); }
.btn-secondary:hover { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }

/* Footer */
.footer-glass { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px 20px 25px; background: var(--card-light); backdrop-filter: var(--blur); border-top: 1px solid var(--border-light); box-shadow: 0 -4px 20px rgba(0,0,0,0.1); z-index: 999; display: flex; justify-content: center; }
[data-theme="dark"] .footer-glass { background: var(--card-dark); border-color: var(--border-dark); box-shadow: 0 -4px 20px rgba(0,0,0,0.3); }
.footer-nav { display: flex; justify-content: space-around; align-items: flex-end; width: 100%; max-width: 500px; }
.footer-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-secondary-light); text-decoration: none; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 8px 16px; border-radius: 16px; position: relative; }
[data-theme="dark"] .footer-item { color: var(--text-secondary-dark); }
.footer-item i { font-size: 20px; transition: all 0.3s ease; }
.footer-item.active { color: var(--primary-blue); transform: translateY(-12px); background: var(--white); box-shadow: 0 8px 20px rgba(26, 115, 232, 0.25); }
[data-theme="dark"] .footer-item.active { color: var(--primary-blue-light); background: rgba(26, 115, 232, 0.2); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
.footer-item.active i { transform: scale(1.1); }

/* Toast */
.toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-light); backdrop-filter: blur(20px); border: 1px solid var(--border-light); border-radius: 12px; padding: 16px 24px; color: inherit; font-weight: 700; z-index: 10000; box-shadow: 0 20px 40px rgba(0,0,0,0.2); display: none; }
[data-theme="dark"] .toast { background: var(--card-dark); border-color: var(--border-dark); }
.toast.show { display: block; }

/* Responsive */
@media (max-width: 380px) {
.friend-card { padding: 12px; }
.friend-avatar { width: 48px; height: 48px; }
.footer-item { padding: 6px 12px; font-size: 10px; }
.footer-item i { font-size: 18px; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-content">
    <div class="user-info" onclick="window.location.href='profile.html'">
      <img src="" class="user-avatar" id="header-avatar">
      <span class="user-name" id="header-name">...</span>
    </div>
    <div class="header-actions">
      <div class="theme-toggle" onclick="toggleTheme()">
        <div class="theme-slider"><i class="fas fa-sun"></i></div>
      </div>
    </div>
  </div>
</header>

<!-- Search -->
<div class="friends-header">
  <div class="search-box">
    <input type="text" id="search-friends" placeholder="بحث عن صديق..." onkeyup="searchFriends()">
    <i class="fas fa-search"></i>
  </div>
</div>

<!-- Tabs -->
<div class="friends-tabs">
  <button class="tab-btn active" onclick="switchTab('all')">
    الكل
    <span class="tab-badge" id="badge-all">0</span>
  </button>
  <button class="tab-btn" onclick="switchTab('friends')">
    الأصدقاء
    <span class="tab-badge" id="badge-friends">0</span>
  </button>
  <button class="tab-btn" onclick="switchTab('requests')">
    الطلبات
    <span class="tab-badge" id="badge-requests">0</span>
  </button>
  <button class="tab-btn" onclick="switchTab('sent')">
    المرسلة
    <span class="tab-badge" id="badge-sent">0</span>
  </button>
</div>

<!-- Friends List -->
<div class="friends-container" id="friends-container">
  <p style="padding:40px;text-align:center;color:var(--text-secondary-light)">جاري التحميل...</p>
</div>

<!-- User Modal -->
<div class="modal-overlay" id="user-modal" onclick="closeModal(event)">
  <div class="modal-card" onclick="event.stopPropagation()">
    <button class="close-modal" onclick="closeModal()"><i class="fas fa-times"></i></button>
    <img src="" class="modal-avatar" id="modal-avatar">
    <div class="modal-name" id="modal-name"></div>
    <div class="modal-username" id="modal-username"></div>
    <div class="modal-stats">
      <div class="stat-item">
        <div class="stat-number" id="modal-friends">0</div>
        <div class="stat-label">صديق</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" id="modal-followers">0</div>
        <div class="stat-label">متابع</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" id="modal-posts">0</div>
        <div class="stat-label">منشور</div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn btn-primary" onclick="viewUserProfile()"><i class="fas fa-user"></i> الملف الشخصي</button>
      <button class="modal-btn btn-secondary" id="modal-action-btn" onclick="handleModalAction()"><i class="fas fa-user-plus"></i> إضافة</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Footer -->
<footer class="footer-glass">
  <nav class="footer-nav">
    <a href="home.html" class="footer-item"><i class="fas fa-home"></i><span>الرئيسية</span></a>
    <a href="posts.html" class="footer-item"><i class="fas fa-newspaper"></i><span>المنشورات</span></a>
    <a href="friends.html" class="footer-item active"><i class="fas fa-user-friends"></i><span>الأصدقاء</span></a>
    <a href="chat.html" class="footer-item"><i class="fas fa-comment-dots"></i><span>الدردشة</span></a>
    <a href="profile.html" class="footer-item"><i class="fas fa-user"></i><span>الملف</span></a>
  </nav>
</footer>

<script type="module">
// ============================================
// 🔷 Firebase Import
// ============================================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, doc, getDoc, updateDoc, arrayUnion, arrayRemove, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ============================================
// 🔷 Firebase Config
// ============================================
const firebaseConfig = {
  apiKey: "AIzaSyD7Ya_TIQj4_VFnAWydj5Xzq2zFjJsN-a4",
  authDomain: "cahtai.firebaseapp.com",
  databaseURL: "https://cahtai-default-rtdb.firebaseio.com",
  projectId: "cahtai",
  storageBucket: "cahtai.firebasestorage.app",
  messagingSenderId: "325594152614",
  appId: "1:325594152614:web:cf5fb37660a0c33b5afe67",
  measurementId: "G-9VMJ193S9R"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ============================================
// 🔷 Check User Session
// ============================================
let currentUser = JSON.parse(localStorage.getItem('currentUser'));
if(!currentUser) { window.location.href = 'index.html'; }

// ============================================
// 👤 Load Header
// ============================================
document.getElementById('header-avatar').src = currentUser.avatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(currentUser.name);
document.getElementById('header-name').textContent = currentUser.name.split(' ')[0];

// ============================================
// 🌓 Theme Toggle
// ============================================
window.toggleTheme = function() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  const icon = document.querySelector('.theme-slider i');
  icon.className = next === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
  localStorage.setItem('theme', next);
}

// ============================================
// 🍞 Toast
// ============================================
window.showToast = function(msg) {
  const t = document.getElementById('toast');
  if(t) { t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
}

// ============================================
// 📊 Load Friends Data
// ============================================
let currentTab = 'all';
let allUsers = [];
let selectedUserId = null;

async function loadFriendsData() {
  const container = document.getElementById('friends-container');
  if(!container) return;
  
  try {
    const snapshot = await getDocs(collection(db, 'users'));
    allUsers = snapshot.docs
      .filter(d => d.id !== currentUser.id)
      .map(d => ({ id: d.id, ...d.data() }));
    
    updateBadges();
    renderTab(currentTab);
  } catch(error) {
    console.error(error);
    container.innerHTML = '<p style="padding:40px;text-align:center;color:#ea4335">خطأ في التحميل</p>';
  }
}

function updateBadges() {
  const friends = allUsers.filter(u => currentUser.friends?.includes(u.id));
  const requests = allUsers.filter(u => u.friendRequests?.some(r => r.from === currentUser.id));
  const sent = allUsers.filter(u => {
    const userRequests = currentUser.sentRequests || [];
    return userRequests.some(r => r.to === u.id);
  });
  
  document.getElementById('badge-all').textContent = allUsers.length;
  document.getElementById('badge-friends').textContent = friends.length;
  document.getElementById('badge-requests').textContent = requests.length;
  document.getElementById('badge-sent').textContent = sent.length;
}

function renderTab(tab) {
  currentTab = tab;
  const container = document.getElementById('friends-container');
  
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event?.target.closest('.tab-btn')?.classList.add('active');
  
  let filtered = [];
  
  if(tab === 'all') {
    filtered = allUsers;
  } else if(tab === 'friends') {
    filtered = allUsers.filter(u => currentUser.friends?.includes(u.id));
  } else if(tab === 'requests') {
    filtered = allUsers.filter(u => u.friendRequests?.some(r => r.from === currentUser.id));
  } else if(tab === 'sent') {
    const sentIds = (currentUser.sentRequests || []).map(r => r.to);
    filtered = allUsers.filter(u => sentIds.includes(u.id));
  }
  
  if(filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><i class="fas fa-users"></i><p>لا يوجد بيانات في هذه القائمة</p></div>';
    return;
  }
  
  container.innerHTML = filtered.map(user => {
    const isFriend = currentUser.friends?.includes(user.id);
    const hasRequest = user.friendRequests?.some(r => r.from === currentUser.id);
    const sentRequest = (currentUser.sentRequests || []).some(r => r.to === user.id);
    
    return `
    <div class="friend-card" onclick="openModal('${user.id}')">
      <img src="${user.avatar || 'https://ui-avatars.com/api/?name=${user.name}'}" class="friend-avatar">
      <div class="friend-info">
        <div class="friend-name">${user.name}</div>
        <div class="friend-username">${user.username || ''}</div>
        <div class="friend-meta">
          <span class="friend-status"><span class="status-dot ${user.isOnline ? '' : 'offline'}"></span>${user.isOnline ? 'متصل الآن' : 'غير متصل'}</span>
          <span>${user.countryFlag || '🌍'}</span>
        </div>
      </div>
      <div class="friend-actions">
        ${isFriend ? `
          <button class="action-btn btn-message" onclick="event.stopPropagation(); startChat('${user.id}')"><i class="fas fa-comment"></i></button>
          <button class="action-btn" onclick="event.stopPropagation(); removeFriend('${user.id}')"><i class="fas fa-user-minus"></i></button>
        ` : hasRequest ? `
          <button class="action-btn btn-accept" onclick="event.stopPropagation(); acceptRequest('${user.id}')"><i class="fas fa-check"></i></button>
          <button class="action-btn btn-reject" onclick="event.stopPropagation(); rejectRequest('${user.id}')"><i class="fas fa-times"></i></button>
        ` : sentRequest ? `
          <button class="action-btn" disabled style="opacity:0.5;cursor:not-allowed"><i class="fas fa-clock"></i></button>
        ` : `
          <button class="action-btn btn-message" onclick="event.stopPropagation(); startChat('${user.id}')"><i class="fas fa-comment"></i></button>
          <button class="action-btn" onclick="event.stopPropagation(); sendRequest('${user.id}')"><i class="fas fa-user-plus"></i></button>
        `}
      </div>
    </div>`;
  }).join('');
}

window.switchTab = function(tab) {
  renderTab(tab);
}

window.searchFriends = function() {
  const term = document.getElementById('search-friends').value.toLowerCase();
  const filtered = allUsers.filter(u => u.name.toLowerCase().includes(term) || u.username?.toLowerCase().includes(term));
  // Render filtered...
}

// ============================================
// 🤝 Friend Actions
// ============================================
window.toggleFriend = async function(userId, btn) {
  if(!userId) { showToast('خطأ'); return; }
  try {
    const userRef = doc(db, 'users', userId);
    const currentUserRef = doc(db, 'users', currentUser.id);
    const isFriend = currentUser.friends?.includes(userId);
    
    if(isFriend) {
      // إزالة صديق
      await updateDoc(userRef, { friends: arrayRemove(currentUser.id) });
      await updateDoc(currentUserRef, { friends: arrayRemove(userId) });
      showToast('تمت الإزالة');
    } else {
      // ✅ إرسال طلب صداقة مع إشعار
      await updateDoc(userRef, { 
        friendRequests: arrayUnion({ 
          from: currentUser.id, 
          name: currentUser.name, 
          avatar: currentUser.avatar,
          status: 'pending'
        }) 
      });
      
      // ✅ إنشاء إشعار للطرف الآخر
      await addDoc(collection(db, 'notifications'), {
        userId: userId,
        text: `${currentUser.name} أرسل لك طلب صداقة`,
        type: 'friend_request',
        fromUser: currentUser.id,
        fromUserName: currentUser.name,
        read: false,
        createdAt: serverTimestamp()
      });
      
      // ✅ حفظ في sentRequests
      await updateDoc(currentUserRef, {
        sentRequests: arrayUnion({ 
          to: userId, 
          status: 'pending' 
        })
      });
      
      showToast('تم إرسال طلب الصداقة ✓');
    }
    loadUsers();
  } catch(error) {
    showToast('حدث خطأ: ' + error.message);
  }
}

window.acceptRequest = async function(userId) {
  try {
    const userRef = doc(db, 'users', userId);
    const currentUserRef = doc(db, 'users', currentUser.id);
    
    await updateDoc(userRef, {
      friends: arrayUnion(currentUser.id),
      friendRequests: []
    });
    await updateDoc(currentUserRef, {
      friends: arrayUnion(userId),
      sentRequests: arrayRemove({ to: userId })
    });
    
    // ✅ إنشاء إشعار للطرف الآخر
    await addDoc(collection(db, 'notifications'), {
      userId: userId,
      text: `${currentUser.name} قبل طلب صداقتك`,
      type: 'friend_request_accepted',
      fromUser: currentUser.id,
      read: false,
      createdAt: serverTimestamp()
    });
    
    showToast('تم قبول طلب الصداقة ✓');
    loadFriendsData();
  } catch(error) {
    showToast('حدث خطأ');
  }
}

window.rejectRequest = async function(userId) {
  try {
    await updateDoc(doc(db, 'users', userId), {
      friendRequests: []
    });
    await updateDoc(doc(db, 'users', currentUser.id), {
      sentRequests: arrayRemove({ to: userId })
    });
    showToast('تم رفض الطلب');
    loadFriendsData();
  } catch(error) {
    showToast('حدث خطأ');
  }
}

window.removeFriend = async function(userId) {
  if(confirm('هل تريد إزالة هذا الصديق؟')) {
    try {
      await updateDoc(doc(db, 'users', userId), { friends: arrayRemove(currentUser.id) });
      await updateDoc(doc(db, 'users', currentUser.id), { friends: arrayRemove(userId) });
      showToast('تمت إزالة الصديق');
      loadFriendsData();
    } catch(error) {
      showToast('حدث خطأ');
    }
  }
}

window.startChat = function(userId) {
  localStorage.setItem('chatWith', userId);
  window.location.href = 'chat.html';
}

// ============================================
// 📱 User Modal
// ============================================
window.openModal = async function(userId) {
  if(!userId) return;
  selectedUserId = userId;
  try {
    const userDoc = await getDoc(doc(db, 'users', userId));
    if(!userDoc.exists()) { showToast('غير موجود'); return; }
    const user = userDoc.data();
    
    document.getElementById('modal-avatar').src = user.avatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.name);
    document.getElementById('modal-name').textContent = user.name;
    document.getElementById('modal-username').textContent = user.username || '';
    document.getElementById('modal-friends').textContent = user.friends?.length || 0;
    document.getElementById('modal-followers').textContent = user.followers || '0';
    document.getElementById('modal-posts').textContent = user.posts || '0';
    
    const actionBtn = document.getElementById('modal-action-btn');
    const isFriend = currentUser.friends?.includes(userId);
    if(isFriend) {
      actionBtn.innerHTML = '<i class="fas fa-comment"></i> رسالة';
      actionBtn.onclick = () => { closeModal(); startChat(userId); };
    } else {
      actionBtn.innerHTML = '<i class="fas fa-user-plus"></i> إضافة';
      actionBtn.onclick = () => { sendRequest(userId); closeModal(); };
    }
    
    document.getElementById('user-modal').classList.add('active');
  } catch(error) {
    showToast('خطأ');
  }
}

window.closeModal = function(event) {
  const modal = document.getElementById('user-modal');
  if(modal && (!event || event.target.id === 'user-modal')) modal.classList.remove('active');
}

window.viewUserProfile = function() {
  closeModal();
  setTimeout(() => {
    localStorage.setItem('viewUserProfile', selectedUserId);
    window.location.href = 'profile.html';
  }, 300);
}

window.handleModalAction = function() {
  if(selectedUserId) {
    const isFriend = currentUser.friends?.includes(selectedUserId);
    if(isFriend) {
      closeModal();
      startChat(selectedUserId);
    } else {
      sendRequest(selectedUserId);
      closeModal();
    }
  }
}

// ============================================
// 🚀 On Load
// ============================================
window.addEventListener('load', () => {
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  const icon = document.querySelector('.theme-slider i');
  icon.className = saved === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
  loadFriendsData();
});
</script>
</body>
</html>
