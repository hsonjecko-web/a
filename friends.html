<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأصدقاء - تطبيقي الاجتماعي</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
:root {
--primary-blue: #1a73e8; --primary-blue-dark: #1557b0; --primary-blue-light: #4a9eff;
--white: #ffffff; --bg-light: #f0f4f8; --bg-dark: #0d1117;
--card-light: rgba(255, 255, 255, 0.7); --card-dark: rgba(13, 17, 23, 0.8);
--border-light: rgba(26, 115, 232, 0.2); --border-dark: rgba(255, 255, 255, 0.1);
--text-primary-light: #1f2937; --text-secondary-light: #6b7280;
--text-primary-dark: #f9fafb; --text-secondary-dark: #9ca3af;
--shadow: 0 8px 32px rgba(31, 38, 135, 0.15); --shadow-dark: 0 8px 32px rgba(0, 0, 0, 0.4);
--blur: blur(12px);
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg-light); min-height: 100vh; color: var(--text-primary-light); overflow-x: hidden; padding-bottom: 100px; transition: all 0.3s ease; }
[data-theme="dark"] body { background: var(--bg-dark); color: var(--text-primary-dark); }

/* Header */
.header { position: sticky; top: 0; z-index: 1000; padding: 12px 20px; background: var(--card-light); backdrop-filter: var(--blur); border-bottom: 1px solid var(--border-light); box-shadow: var(--shadow); }
[data-theme="dark"] .header { background: var(--card-dark); border-bottom: 1px solid var(--border-dark); box-shadow: var(--shadow-dark); }
.header-content { display: flex; justify-content: space-between; align-items: center; }
.user-info { display: flex; align-items: center; gap: 12px; cursor: pointer; }
.user-avatar { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--primary-blue); object-fit: cover; }
.user-name { font-weight: 700; font-size: 16px; color: inherit; }
.header-actions { display: flex; gap: 10px; align-items: center; }
.theme-toggle { width: 48px; height: 26px; background: var(--primary-blue); border-radius: 13px; cursor: pointer; padding: 3px; }
[data-theme="dark"] .theme-toggle { background: #374151; }
.theme-slider { width: 20px; height: 20px; background: white; border-radius: 50%; position: absolute; right: 3px; transition: transform 0.3s ease; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--primary-blue); }
[data-theme="dark"] .theme-slider { transform: translateX(-22px); color: #374151; }
.icon-btn { width: 38px; height: 38px; border-radius: 50%; background: transparent; border: 1px solid var(--border-light); color: var(--primary-blue); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
[data-theme="dark"] .icon-btn { border-color: var(--border-dark); color: var(--primary-blue-light); }

/* Friends Page */
.friends-header { padding: 15px 20px; display: flex; gap: 10px; align-items: center; }
.search-box { flex: 1; position: relative; }
.search-box input { width: 100%; padding: 14px 20px 14px 45px; border: 1px solid var(--border-light); border-radius: 16px; background: var(--card-light); backdrop-filter: var(--blur); font-size: 14px; color: inherit; }
[data-theme="dark"] .search-box input { background: var(--card-dark); border-color: var(--border-dark); }
.search-box i { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-secondary-light); }
.filter-btn { padding: 14px; border: 1px solid var(--border-light); border-radius: 16px; background: var(--card-light); color: inherit; cursor: pointer; }
[data-theme="dark"] .filter-btn { background: var(--card-dark); border-color: var(--border-dark); }

/* Tabs */
.friends-tabs { display: flex; gap: 8px; padding: 0 20px 15px; overflow-x: auto; scrollbar-width: none; }
.friends-tabs::-webkit-scrollbar { display: none; }
.tab-btn { padding: 10px 20px; border: none; border-radius: 20px; background: var(--card-light); color: inherit; font-weight: 600; font-size: 13px; cursor: pointer; white-space: nowrap; transition: all 0.3s ease; }
[data-theme="dark"] .tab-btn { background: var(--card-dark); }
.tab-btn.active { background: var(--primary-blue); color: white; }

/* Friend Card */
.friends-container { padding: 0 20px; }
.friend-card { background: var(--card-light); backdrop-filter: var(--blur); border: 1px solid var(--border-light); border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow); transition: all 0.3s ease; }
[data-theme="dark"] .friend-card { background: var(--card-dark); border-color: var(--border-dark); box-shadow: var(--shadow-dark); }
.friend-card:hover { transform: translateY(-2px); border-color: var(--primary-blue); }
.friend-avatar { width: 56px; height: 56px; border-radius: 50%; border: 2px solid var(--primary-blue); object-fit: cover; }
.friend-info { flex: 1; min-width: 0; }
.friend-name { font-weight: 700; font-size: 15px; color: inherit; margin-bottom: 4px; }
.friend-username { font-size: 12px; color: var(--text-secondary-light); margin-bottom: 6px; }
[data-theme="dark"] .friend-username { color: var(--text-secondary-dark); }
.friend-meta { display: flex; gap: 12px; font-size: 11px; color: var(--text-secondary-light); }
[data-theme="dark"] .friend-meta { color: var(--text-secondary-dark); }
.friend-status { display: flex; align-items: center; gap: 4px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; }
.status-dot.offline { background: #9ca3af; }
.friend-actions { display: flex; flex-direction: column; gap: 8px; }
.action-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border-light); background: transparent; color: var(--primary-blue); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.3s ease; }
[data-theme="dark"] .action-btn { border-color: var(--border-dark); color: var(--primary-blue-light); }
.action-btn:hover { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }
.btn-message { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }
.btn-message:hover { background: var(--primary-blue-dark); }

/* Empty State */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary-light); }
.empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.empty-state p { font-size: 14px; }

/* Modal */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.active { display: flex; }
.modal-card { background: var(--card-light); backdrop-filter: blur(20px); border: 1px solid var(--border-light); border-radius: 24px; padding: 24px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.25); }
[data-theme="dark"] .modal-card { background: var(--card-dark); border-color: var(--border-dark); }
.close-modal { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: 50%; background: rgba(234,67,53,0.1); border: none; color: #ea4335; cursor: pointer; }
.modal-avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary-blue); margin-bottom: 12px; }
.modal-name { font-size: 20px; font-weight: 800; color: inherit; margin-bottom: 4px; }
.modal-username { color: var(--text-secondary-light); font-size: 13px; margin-bottom: 20px; }
[data-theme="dark"] .modal-username { color: var(--text-secondary-dark); }
.modal-stats { display: flex; justify-content: space-around; margin: 20px 0; padding: 16px; background: rgba(26,115,232,0.1); border-radius: 12px; }
[data-theme="dark"] .modal-stats { background: rgba(26,115,232,0.2); }
.stat-number { font-size: 18px; font-weight: 800; color: var(--primary-blue); }
.stat-label { font-size: 11px; color: var(--text-secondary-light); margin-top: 4px; }
[data-theme="dark"] .stat-label { color: var(--text-secondary-dark); }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; }
.modal-btn { flex: 1; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; font-size: 13px; }
.btn-primary { background: var(--primary-blue); color: white; }
.btn-secondary { background: transparent; color: var(--primary-blue); border: 1px solid var(--border-light); }
[data-theme="dark"] .btn-secondary { color: var(--primary-blue-light); border-color: var(--border-dark); }

/* Footer */
.footer-glass { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px 20px 25px; background: var(--card-light); backdrop-filter: var(--blur); border-top: 1px solid var(--border-light); box-shadow: 0 -4px 20px rgba(0,0,0,0.1); z-index: 1000; }
[data-theme="dark"] .footer-glass { background: var(--card-dark); border-color: var(--border-dark); box-shadow: 0 -4px 20px rgba(0,0,0,0.3); }
.footer-nav { display: flex; justify-content: space-around; align-items: flex-end; max-width: 500px; margin: 0 auto; }
.footer-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-secondary-light); text-decoration: none; font-size: 11px; font-weight: 600; cursor: pointer; padding: 8px 16px; border-radius: 16px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
[data-theme="dark"] .footer-item { color: var(--text-secondary-dark); }
.footer-item i { font-size: 20px; }
.footer-item.active { color: var(--primary-blue); transform: translateY(-12px); background: var(--white); box-shadow: 0 8px 20px rgba(26, 115, 232, 0.25); }
[data-theme="dark"] .footer-item.active { color: var(--primary-blue-light); background: rgba(26, 115, 232, 0.2); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }

/* Toast */
.toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-light); backdrop-filter: blur(20px); border: 1px solid var(--border-light); border-radius: 12px; padding: 16px 24px; color: inherit; font-weight: 700; z-index: 10000; display: none; }
[data-theme="dark"] .toast { background: var(--card-dark); border-color: var(--border-dark); }
.toast.show { display: block; }
</style>
</head>
<body>
<!-- Header -->
<header class="header">
  <div class="header-content">
    <div class="user-info" onclick="window.location.href='profile.html'">
      <img src="" class="user-avatar" id="header-avatar">
      <span class="user-name" id="header-name">...</span>
    </div>
    <div class="header-actions">
      <div class="theme-toggle" onclick="toggleTheme()"><div class="theme-slider"><i class="fas fa-sun"></i></div></div>
    </div>
  </div>
</header>

<!-- Friends Header -->
<div class="friends-header">
  <div class="search-box">
    <input type="text" id="search-friends" placeholder="بحث عن صديق..." onkeyup="searchFriends()">
    <i class="fas fa-search"></i>
  </div>
  <button class="filter-btn" onclick="showToast('فلترة')"><i class="fas fa-filter"></i></button>
</div>

<!-- Tabs -->
<div class="friends-tabs">
  <button class="tab-btn active" onclick="switchTab('all')">الكل</button>
  <button class="tab-btn" onclick="switchTab('online')">متصلون</button>
  <button class="tab-btn" onclick="switchTab('requests')">الطلبات</button>
  <button class="tab-btn" onclick="switchTab('blocked')">المحظورون</button>
</div>

<!-- Friends List -->
<div class="friends-container" id="friends-container"></div>

<!-- User Modal -->
<div class="modal-overlay" id="user-modal" onclick="closeModal(event)">
  <div class="modal-card" onclick="event.stopPropagation()">
    <button class="close-modal" onclick="closeModal()"><i class="fas fa-times"></i></button>
    <img src="" class="modal-avatar" id="modal-avatar">
    <div class="modal-name" id="modal-name"></div>
    <div class="modal-username" id="modal-username"></div>
    <div class="modal-stats">
      <div class="stat-item"><div class="stat-number" id="modal-friends"></div><div class="stat-label">صديق</div></div>
      <div class="stat-item"><div class="stat-number" id="modal-followers"></div><div class="stat-label">متابع</div></div>
      <div class="stat-item"><div class="stat-number" id="modal-posts"></div><div class="stat-label">منشور</div></div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn btn-primary" onclick="viewProfile()"><i class="fas fa-user"></i> الملف</button>
      <button class="modal-btn btn-secondary" onclick="toggleFriendFromModal()"><i class="fas fa-user-plus"></i> إضافة</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Footer -->
<footer class="footer-glass">
  <nav class="footer-nav">
    <div class="footer-item" onclick="window.location.href='home.html'"><i class="fas fa-home"></i><span>الرئيسية</span></div>
    <div class="footer-item" onclick="window.location.href='posts.html'"><i class="fas fa-newspaper"></i><span>المنشورات</span></div>
    <div class="footer-item active" onclick="window.location.href='friends.html'"><i class="fas fa-user-friends"></i><span>الأصدقاء</span></div>
    <div class="footer-item" onclick="window.location.href='chat.html'"><i class="fas fa-comment-dots"></i><span>الدردشة</span></div>
    <div class="footer-item" onclick="window.location.href='profile.html'"><i class="fas fa-user"></i><span>الملف</span></div>
  </nav>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, doc, updateDoc, arrayUnion, arrayRemove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7Ya_TIQj4_VFnAWydj5Xzq2zFjJsN-a4",
  authDomain: "cahtai.firebaseapp.com",
  databaseURL: "https://cahtai-default-rtdb.firebaseio.com",
  projectId: "cahtai",
  storageBucket: "cahtai.firebasestorage.app",
  messagingSenderId: "325594152614",
  appId: "1:325594152614:web:cf5fb37660a0c33b5afe67",
  measurementId: "G-9VMJ193S9R"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const currentUser = JSON.parse(localStorage.getItem('currentUser'));
if(!currentUser) { window.location.href = 'index.html'; }

document.getElementById('header-avatar').src = currentUser.avatar;
document.getElementById('header-name').textContent = currentUser.name.split(' ')[0];

// Theme
window.toggleTheme = function() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}
window.addEventListener('load', () => {
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  loadFriends();
});

// Load Friends
let currentTab = 'all';
let allFriends = [];

async function loadFriends(filter = 'all') {
  const container = document.getElementById('friends-container');
  
  // Fetch users from Firestore
  const q = query(collection(db, 'users'), where('id', '!=', currentUser.id));
  const snapshot = await getDocs(q);
  
  allFriends = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
  
  let filtered = allFriends;
  if(filter === 'online') {
    filtered = allFriends.filter(u => u.isOnline);
  } else if(filter === 'requests') {
    filtered = allFriends.filter(u => u.friendRequest?.to === currentUser.id);
  } else if(filter === 'blocked') {
    filtered = allFriends.filter(u => currentUser.blocked?.includes(u.id));
  }
  
  if(filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><i class="fas fa-users"></i><p>لا يوجد أصدقاء في هذه القائمة</p></div>`;
    return;
  }
  
  container.innerHTML = filtered.map(user => {
    const isFriend = currentUser.friends?.includes(user.id);
    const isBlocked = currentUser.blocked?.includes(user.id);
    const isRequest = user.friendRequest?.to === currentUser.id;
    
    return `
    <div class="friend-card" onclick="openModal('${user.id}')">
      <img src="${user.avatar}" class="friend-avatar">
      <div class="friend-info">
        <div class="friend-name">${user.name}</div>
        <div class="friend-username">${user.username}</div>
        <div class="friend-meta">
          <span class="friend-status"><span class="status-dot ${user.isOnline ? '' : 'offline'}"></span>${user.isOnline ? 'متصل الآن' : 'غير متصل'}</span>
          <span>${user.countryFlag || '🌍'} ${user.country || ''}</span>
        </div>
      </div>
      <div class="friend-actions">
        ${!isBlocked && !isRequest ? `<button class="action-btn btn-message" onclick="event.stopPropagation(); startChat('${user.id}')"><i class="fas fa-comment"></i></button>` : ''}
        <button class="action-btn" onclick="event.stopPropagation(); ${isBlocked ? 'unblockUser' : isFriend ? 'removeFriend' : isRequest ? 'acceptRequest' : 'addFriend'}('${user.id}')">
          <i class="fas ${isBlocked ? 'fa-unlock' : isFriend ? 'fa-user-minus' : isRequest ? 'fa-check' : 'fa-user-plus'}"></i>
        </button>
      </div>
    </div>`;
  }).join('');
}

window.switchTab = function(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  loadFriends(tab);
}

window.searchFriends = function() {
  const term = document.getElementById('search-friends').value.toLowerCase();
  const filtered = allFriends.filter(u => u.name.toLowerCase().includes(term) || u.username.toLowerCase().includes(term));
  // Render filtered...
}

// Modal
let selectedUserId = null;
window.openModal = async function(userId) {
  selectedUserId = userId;
  const user = allFriends.find(u => u.id === userId);
  if(!user) return;
  
  document.getElementById('modal-avatar').src = user.avatar;
  document.getElementById('modal-name').textContent = user.name;
  document.getElementById('modal-username').textContent = user.username;
  document.getElementById('modal-friends').textContent = user.friends?.length || 0;
  document.getElementById('modal-followers').textContent = user.followers || '0';
  document.getElementById('modal-posts').textContent = user.posts || '0';
  document.getElementById('user-modal').classList.add('active');
}
window.closeModal = function(e) {
  if(!e || e.target.id === 'user-modal') {
    document.getElementById('user-modal').classList.remove('active');
  }
}
window.viewProfile = function() {
  closeModal();
  setTimeout(() => window.location.href = 'profile.html', 300);
}

// Actions
window.addFriend = async function(userId) {
  await updateDoc(doc(db, 'users', userId), {
    friendRequests: arrayUnion({ from: currentUser.id, name: currentUser.name, avatar: currentUser.avatar })
  });
  showToast('تم إرسال طلب الصداقة ✓');
  loadFriends(currentTab);
}

window.removeFriend = async function(userId) {
  if(confirm('هل تريد إزالة هذا الصديق؟')) {
    await updateDoc(doc(db, 'users', currentUser.id), {
      friends: arrayRemove(userId)
    });
    await updateDoc(doc(db, 'users', userId), {
      friends: arrayRemove(currentUser.id)
    });
    showToast('تمت إزالة الصديق');
    loadFriends(currentTab);
  }
}

window.acceptRequest = async function(userId) {
  await updateDoc(doc(db, 'users', currentUser.id), {
    friends: arrayUnion(userId)
  });
  await updateDoc(doc(db, 'users', userId), {
    friends: arrayUnion(currentUser.id),
    friendRequests: []
  });
  showToast('تم قبول طلب الصداقة ✓');
  loadFriends(currentTab);
}

window.blockUser = async function(userId) {
  if(confirm('هل تريد حظر هذا المستخدم؟')) {
    await updateDoc(doc(db, 'users', currentUser.id), {
      blocked: arrayUnion(userId)
    });
    showToast('تم حظر المستخدم');
    loadFriends(currentTab);
  }
}

window.unblockUser = async function(userId) {
  await updateDoc(doc(db, 'users', currentUser.id), {
    blocked: arrayRemove(userId)
  });
  showToast('تم إلغاء الحظر');
  loadFriends(currentTab);
}

window.startChat = function(userId) {
  localStorage.setItem('chatWith', userId);
  window.location.href = 'chat.html';
}

window.showToast = function(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
