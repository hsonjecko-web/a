<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>نظام التميز - إنشاء مستخدم جديد</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <style>
    :root {
      --bg-page: #0b0f19; --bg-main: linear-gradient(135deg, #111827 0%, #0f172a 100%);
      --glass-bg: rgba(30, 41, 59, 0.4); --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      --text-primary: #f8fafc; --text-secondary: #94a3b8; --text-muted: #64748b;
      --accent-blue: #3b82f6; --accent-green: #22c55e; --accent-purple: #a855f7;
      --accent-red: #ef4444; --accent-amber: #f59e0b;
      --header-height: 64px; --footer-height: 70px;
      --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: 'Cairo', sans-serif; }
    html, body { height: 100%; background: var(--bg-main); color: var(--text-primary); overflow-x: hidden; }
    body { padding-top: calc(var(--header-height) + var(--safe-top)); padding-bottom: calc(var(--footer-height) + var(--safe-bottom) + 20px); }

    .app-header { position: fixed; top: 0; left: 0; right: 0; height: var(--header-height); padding: 0 16px; padding-top: var(--safe-top); display: flex; align-items: center; justify-content: space-between; background: rgba(15,23,42,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--glass-border); z-index: 100; }
    .menu-toggle { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; color: var(--text-primary); cursor: pointer; border-radius: 10px; }
    .header-controls { display: flex; align-items: center; gap: 12px; }
    .theme-btn, .user-info { display: flex; align-items: center; justify-content: center; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 10px; padding: 6px 10px; cursor: pointer; }
    .user-info { flex-direction: column; align-items: flex-end; background: transparent; border: none; padding: 0; }
    .user-info span { font-weight: 600; font-size: 0.9rem; }
    .user-info small { font-size: 0.7rem; color: var(--text-muted); }

    main { padding: 16px; max-width: 800px; margin: 0 auto; }
    .page-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .page-title .material-icons-round { color: var(--accent-purple); }

    .form-container { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; box-shadow: var(--glass-shadow); backdrop-filter: blur(10px); }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; }
    .form-input, .form-select { width: 100%; padding: 12px 14px; background: rgba(15,23,42,0.6); border: 1px solid var(--glass-border); border-radius: 10px; color: var(--text-primary); font-size: 0.95rem; outline: none; }
    .form-input:focus, .form-select:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
    .form-row { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 640px) { .form-row { grid-template-columns: 1fr 1fr; } }

    .perms-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 8px; }
    @media (min-width: 600px) { .perms-grid { grid-template-columns: 1fr 1fr; } }
    .perm-check { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: rgba(15,23,42,0.4); border-radius: 8px; cursor: pointer; }
    .perm-check input { width: 18px; height: 18px; accent-color: var(--accent-purple); }

    .form-actions { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
    .btn { flex: 1; min-width: 120px; padding: 12px 20px; border: none; border-radius: 10px; font-weight: 600; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--accent-purple); color: #fff; box-shadow: 0 4px 12px rgba(168,85,247,0.3); }
    .btn-secondary { background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-primary); }

    .alert { padding: 12px; border-radius: 10px; margin-bottom: 16px; font-size: 0.9rem; display: none; }
    .alert.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: var(--accent-green); display: block; }
    .alert.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: var(--accent-red); display: block; }

    .users-list { margin-top: 24px; }
    .users-list h3 { font-size: 1.1rem; margin-bottom: 12px; color: var(--text-secondary); }
    .user-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(15,23,42,0.4); border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--glass-border); }
    .user-item .name { font-weight: 600; }
    .user-item .role { font-size: 0.75rem; padding: 2px 8px; border-radius: 12px; background: rgba(59,130,246,0.2); color: var(--accent-blue); }
    .user-item .role.admin { background: rgba(168,85,247,0.2); color: var(--accent-purple); }

    /* PWA Install Button */
    #installBtn { position: fixed; bottom: 90px; left: 16px; z-index: 1000; background: var(--accent-green); color: #fff; border: none; border-radius: 50px; padding: 12px 20px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 16px rgba(34,197,94,0.4); display: none; align-items: center; gap: 8px; animation: slideUp 0.3s ease; }
    #installBtn.show { display: flex; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    html.light-mode { --bg-page: #f0f9ff; --bg-main: radial-gradient(circle at 50% -20%, #f0f9ff 0%, #e0f2fe 100%) !important; --glass-bg: rgba(255,255,255,0.75) !important; --glass-border: rgba(59,130,246,0.2) !important; --text-primary: #1e293b !important; --text-secondary: #64748b !important; --text-muted: rgba(30,41,59,0.5) !important; }
    html.light-mode body { background: var(--bg-main); }
    html.light-mode .form-input, html.light-mode .form-select { background: rgba(59,130,246,0.05) !important; border-color: rgba(59,130,246,0.2) !important; color: #1e293b !important; }
    html.light-mode .perm-check { background: rgba(59,130,246,0.08) !important; }
    html.light-mode .user-item { background: rgba(59,130,246,0.05) !important; }
  </style>
</head>
<body>

  <header class="app-header">
    <button class="menu-toggle" onclick="history.back()"><span class="material-icons-round">arrow_forward</span></button>
    <div class="header-controls">
      <div class="user-info">
        <span id="adminName">مدير النظام</span>
        <small>إدارة المستخدمين</small>
      </div>
  </header>

  <main>
    <h1 class="page-title"><span class="material-icons-round">person_add</span>إنشاء مستخدم جديد</h1>
    
    <div id="alertBox" class="alert"></div>

    <form class="form-container" id="createUserForm" onsubmit="createUser(event)">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">اسم المستخدم (يوزر) *</label>
          <input type="text" class="form-input" id="username" placeholder="مثال: user123" required>
        </div>
        <div class="form-group">
          <label class="form-label">كلمة المرور *</label>
          <input type="text" class="form-input" id="password" placeholder="4 أحرف على الأقل" required minlength="4">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">الاسم الكامل *</label>
          <input type="text" class="form-input" id="name" placeholder="الاسم الظاهر في النظام" required>
        </div>
        <div class="form-group">
          <label class="form-label">رقم الهاتف</label>
          <input type="tel" class="form-input" id="phone" placeholder="اختياري">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">نوع الحساب *</label>
        <select class="form-select" id="role" onchange="togglePermissions()">
          <option value="user">مستخدم عادي</option>
          <option value="admin">مدير نظام</option>
        </select>
      </div>

      <div class="form-group" id="permissionsSection">
        <label class="form-label">الصلاحيات - الصفحات المسموح بدخولها</label>
        <div class="perms-grid">
          <label class="perm-check"><input type="checkbox" value="home.html" checked> <span>لوحة التحكم</span></label>
          <label class="perm-check"><input type="checkbox" value="customers.html" checked> <span>الزبائن</span></label>
          <label class="perm-check"><input type="checkbox" value="add_customer.html" checked> <span>إضافة زبون</span></label>
          <label class="perm-check"><input type="checkbox" value="guarantors.html" checked> <span>الكفلاء</span></label>
          <label class="perm-check"><input type="checkbox" value="add_guarantor.html" checked> <span>إضافة كفيل</span></label>
          <label class="perm-check"><input type="checkbox" value="materials.html" checked> <span>المواد</span></label>
          <label class="perm-check"><input type="checkbox" value="add_material.html" checked> <span>إضافة مادة</span></label>
          <label class="perm-check"><input type="checkbox" value="store.html" checked> <span>المخزن</span></label>
          <label class="perm-check"><input type="checkbox" value="installments.html" checked> <span>الأقساط</span></label>
          <label class="perm-check"><input type="checkbox" value="add_installment.html" checked> <span>إضافة قسط</span></label>
          <label class="perm-check"><input type="checkbox" value="sales.html" checked> <span>المبيعات</span></label>
          <label class="perm-check"><input type="checkbox" value="add_sale.html" checked> <span>إضافة بيع</span></label>
          <label class="perm-check"><input type="checkbox" value="archive.html" checked> <span>الأرشيف</span></label>
          <label class="perm-check"><input type="checkbox" value="monthly_payments_report.html" checked> <span>تقارير التسديدات</span></label>
          <label class="perm-check"><input type="checkbox" value="monthly_sales_report.html" checked> <span>تقارير المبيعات</span></label>
          <label class="perm-check"><input type="checkbox" value="monthly_dues_report.html" checked> <span>تقارير المستحقات</span></label>
          <label class="perm-check"><input type="checkbox" value="settings.html" checked> <span>الإعدادات</span></label>
          <label class="perm-check"><input type="checkbox" value="support.html" checked> <span>الدعم الفني</span></label>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">
          <span class="material-icons-round">save</span> إنشاء المستخدم
        </button>
        <button type="button" class="btn btn-secondary" onclick="window.location.href='home.html'">
          <span class="material-icons-round">arrow_back</span> رجوع
        </button>
      </div>
    </form>

    <div class="users-list" id="usersList">
      <h3><span class="material-icons-round" style="font-size:18px;vertical-align:middle">people</span> المستخدمين الحاليين</h3>
      <div id="usersContainer">جاري التحميل...</div>
    </div>
  </main>

  <!-- PWA Install Button -->
  <button id="installBtn" onclick="installPWA()">
    <span class="material-icons-round">download</span>
    تثبيت التطبيق
  </button>

  <script src="auth.js"></script>
  <script>
    // PWA Install
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBtn').classList.add('show');
    });
    async function installPWA() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        document.getElementById('installBtn').classList.remove('show');
      }
      deferredPrompt = null;
    }

    // Check admin
    async function checkAdmin() {
      const user = await getCurrentUser();
      if (!user || user.role !== 'admin') {
        alert('⛔ هذه الصفحة للمدير فقط');
        window.location.href = 'home.html';
        return;
      }
      document.getElementById('adminName').textContent = user.name || 'مدير النظام';
      loadUsers();
    }

    function togglePermissions() {
      const isAdmin = document.getElementById('role').value === 'admin';
      document.getElementById('permissionsSection').style.display = isAdmin ? 'none' : 'block';
    }

    async function createUser(e) {
      e.preventDefault();
      const alertBox = document.getElementById('alertBox');
      alertBox.className = 'alert';
      alertBox.style.display = 'none';

      const role = document.getElementById('role').value;
      let permissions = ['*'];
      if (role !== 'admin') {
        permissions = Array.from(document.querySelectorAll('.perm-check input:checked')).map(cb => cb.value);
        if (permissions.length === 0) {
          alertBox.className = 'alert error';
          alertBox.textContent = '❌ يجب اختيار صلاحية واحدة على الأقل';
          return;
        }
      }

      const data = {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value.trim(),
        name: document.getElementById('name').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        role: role,
        permissions: permissions
      };

      try {
        const result = await apiSend('create_user.php', 'POST', data);
        if (result.success) {
          alertBox.className = 'alert success';
          alertBox.innerHTML = `✅ تم إنشاء المستخدم <strong>${data.username}</strong> بنجاح!<br>اليوزر: ${data.username} | الباسورد: ${data.password}`;
          document.getElementById('createUserForm').reset();
          loadUsers();
        } else {
          alertBox.className = 'alert error';
          alertBox.textContent = '❌ ' + (result.message || 'خطأ في الإنشاء');
        }
      } catch (err) {
        alertBox.className = 'alert error';
        alertBox.textContent = '❌ خطأ في الاتصال بالسيرفر';
      }
    }

    async function loadUsers() {
      try {
        const result = await apiGet('users.php');
        const container = document.getElementById('usersContainer');
        if (!result.success || !result.users || result.users.length === 0) {
          container.innerHTML = '<p style="color:var(--text-muted);text-align:center">لا يوجد مستخدمين</p>';
          return;
        }
        container.innerHTML = result.users.map(u => `
          <div class="user-item">
            <div>
              <div class="name">${u.name} <small style="color:var(--text-muted)">(@${u.username})</small></div>
              <div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px">${u.phone || 'لا يوجد هاتف'}</div>
            <span class="role ${u.role}">${u.role === 'admin' ? 'مدير' : 'مستخدم'}</span>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('usersContainer').innerHTML = '<p style="color:var(--text-muted);text-align:center">خطأ في التحميل</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', checkAdmin);
  </script>
</body>
</html>
