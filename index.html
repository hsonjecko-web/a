<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تسجيل الدخول - تطبيقي الاجتماعي</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
:root {
--primary-blue: #1a73e8; --primary-blue-dark: #1557b0; --white: #ffffff;
--bg-light: #f0f4f8; --bg-dark: #0d1117;
--card-light: rgba(255, 255, 255, 0.85); --card-dark: rgba(13, 17, 23, 0.9);
--border-light: rgba(26, 115, 232, 0.2); --border-dark: rgba(255, 255, 255, 0.1);
--text-primary-light: #1f2937; --text-secondary-light: #6b7280;
--text-primary-dark: #f9fafb; --text-secondary-dark: #9ca3af;
--shadow: 0 8px 32px rgba(31, 38, 135, 0.15); --blur: blur(16px);
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
body { background: var(--bg-light); min-height: 100vh; color: var(--text-primary-light); display: flex; align-items: center; justify-content: center; padding: 20px; transition: all 0.3s ease; }
[data-theme="dark"] body { background: var(--bg-dark); color: var(--text-primary-dark); }
.auth-container { background: var(--card-light); backdrop-filter: var(--blur); border: 1px solid var(--border-light); border-radius: 24px; padding: 32px 24px; width: 100%; max-width: 420px; box-shadow: var(--shadow); }
[data-theme="dark"] .auth-container { background: var(--card-dark); border-color: var(--border-dark); }
.auth-header { text-align: center; margin-bottom: 28px; }
.auth-logo { width: 70px; height: 70px; background: var(--primary-blue); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 28px; color: white; }
.auth-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.auth-subtitle { font-size: 13px; color: var(--text-secondary-light); }
[data-theme="dark"] .auth-subtitle { color: var(--text-secondary-dark); }
.auth-tabs { display: flex; gap: 8px; margin-bottom: 24px; background: rgba(26, 115, 232, 0.1); border-radius: 12px; padding: 4px; }
.auth-tab { flex: 1; padding: 12px; border: none; background: transparent; border-radius: 10px; font-weight: 700; font-size: 14px; color: var(--text-secondary-light); cursor: pointer; }
.auth-tab.active { background: var(--primary-blue); color: white; }
.form-group { margin-bottom: 18px; }
.form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
.form-input { width: 100%; padding: 14px 16px; border: 1px solid var(--border-light); border-radius: 12px; background: rgba(255,255,255,0.6); font-size: 14px; }
[data-theme="dark"] .form-input { background: rgba(255,255,255,0.1); border-color: var(--border-dark); }
.form-input:focus { outline: none; border-color: var(--primary-blue); }
.btn-primary { width: 100%; padding: 16px; border: none; border-radius: 14px; background: var(--primary-blue); color: white; font-weight: 800; font-size: 15px; cursor: pointer; }
.btn-primary:hover { background: var(--primary-blue-dark); }
.btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
.auth-footer { text-align: center; margin-top: 24px; font-size: 13px; color: var(--text-secondary-light); }
.theme-toggle { position: fixed; top: 20px; left: 20px; width: 48px; height: 26px; background: var(--primary-blue); border-radius: 13px; cursor: pointer; padding: 3px; }
[data-theme="dark"] .theme-toggle { background: #374151; }
.theme-slider { width: 20px; height: 20px; background: white; border-radius: 50%; position: absolute; right: 3px; transition: transform 0.3s ease; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--primary-blue); }
[data-theme="dark"] .theme-slider { transform: translateX(-22px); color: #374151; }
.toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-light); border: 1px solid var(--border-light); border-radius: 12px; padding: 16px 24px; font-weight: 700; z-index: 10000; display: none; }
[data-theme="dark"] .toast { background: var(--card-dark); border-color: var(--border-dark); }
.toast.show { display: block; }
.loading { display: none; text-align: center; padding: 12px; color: var(--primary-blue); font-weight: 600; }
.loading.show { display: block; }
.error-msg { color: #ea4335; font-size: 12px; margin-top: 6px; display: none; }
.error-msg.show { display: block; }
</style>
</head>
<body>
<div class="theme-toggle" onclick="toggleTheme()"><div class="theme-slider"><i class="fas fa-sun"></i></div></div>
<div class="auth-container">
  <div class="auth-header">
    <div class="auth-logo"><i class="fas fa-mosque"></i></div>
    <h1 class="auth-title">تطبيقي الاجتماعي</h1>
    <p class="auth-subtitle">مجتمع إسلامي يجمعنا على الخير</p>
  </div>
  <div class="auth-tabs">
    <button class="auth-tab active" onclick="switchAuth('login')">تسجيل الدخول</button>
    <button class="auth-tab" onclick="switchAuth('register')">إنشاء حساب</button>
  </div>
  
  <form id="login-form" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label class="form-label">اسم المستخدم</label>
      <input type="text" class="form-input" id="login-username" placeholder="@ahmed_m" required>
    </div>
    <div class="form-group">
      <label class="form-label">كلمة المرور</label>
      <input type="password" class="form-input" id="login-password" placeholder="••••••••" required>
    </div>
    <div class="error-msg" id="login-error"></div>
    <div class="loading" id="login-loading">جاري التسجيل...</div>
    <button type="submit" class="btn-primary">دخول <i class="fas fa-arrow-left"></i></button>
  </form>
  
  <form id="register-form" onsubmit="handleRegister(event)" style="display:none">
    <div class="form-group">
      <label class="form-label">الاسم الكامل</label>
      <input type="text" class="form-input" id="reg-fullname" placeholder="أحمد محمد" required>
    </div>
    <div class="form-group">
      <label class="form-label">اسم المستخدم</label>
      <input type="text" class="form-input" id="reg-username" placeholder="@ahmed_m" pattern="^@[a-zA-Z0-9_]+$" required>
    </div>
    <div class="form-group">
      <label class="form-label">الدولة</label>
      <select class="form-input" id="reg-country" required>
        <option value="SA|🇸🇦">السعودية 🇸🇦</option>
        <option value="EG|🇪🇬">مصر 🇪🇬</option>
        <option value="AE|🇦🇪">الإمارات 🇦🇪</option>
        <option value="KW|🇰🇼">الكويت 🇰🇼</option>
        <option value="other|🌍">أخرى 🌍</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">كلمة المرور</label>
      <input type="password" class="form-input" id="reg-password" minlength="6" required>
    </div>
    <div class="form-group">
      <label class="form-label">تأكيد كلمة المرور</label>
      <input type="password" class="form-input" id="reg-confirm" required>
    </div>
    <div class="error-msg" id="reg-error"></div>
    <div class="loading" id="reg-loading">جاري إنشاء الحساب...</div>
    <button type="submit" class="btn-primary">إنشاء حساب <i class="fas fa-user-plus"></i></button>
  </form>
  
  <div class="auth-footer">
    <p>بالتسجيل توافق على <a href="#" style="color:var(--primary-blue)">شروط الاستخدام</a></p>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, getDocs, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7Ya_TIQj4_VFnAWydj5Xzq2zFjJsN-a4",
  authDomain: "cahtai.firebaseapp.com",
  databaseURL: "https://cahtai-default-rtdb.firebaseio.com",
  projectId: "cahtai",
  storageBucket: "cahtai.firebasestorage.app",
  messagingSenderId: "325594152614",
  appId: "1:325594152614:web:cf5fb37660a0c33b5afe67",
  measurementId: "G-9VMJ193S9R"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.toggleTheme = function() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  const icon = document.querySelector('.theme-slider i');
  icon.className = next === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
  localStorage.setItem('theme', next);
}

window.addEventListener('load', () => {
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  const icon = document.querySelector('.theme-slider i');
  icon.className = saved === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
});

window.switchAuth = function(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
}

window.showToast = function(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

window.handleLogin = async function(e) {
  e.preventDefault();
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const errorEl = document.getElementById('login-error');
  const loading = document.getElementById('login-loading');
  
  errorEl.classList.remove('show');
  errorEl.textContent = '';
  
  if(username === 'admin' && password === '002200') {
    localStorage.setItem('currentUser', JSON.stringify({id: 'admin', name: 'المدير', username: '@admin', isAdmin: true, avatar: 'https://ui-avatars.com/api/?name=المدير&background=1a73e8&color=fff'}));
    window.location.href = 'admin.html';
    return;
  }
  
  loading.classList.add('show');
  try {
    const q = query(collection(db, 'users'), where('username', '==', username));
    const snapshot = await getDocs(q);
    if(snapshot.empty) throw new Error('المستخدم غير موجود');
    
    const userData = snapshot.docs[0].data();
    const userId = snapshot.docs[0].id;
    
    if(userData.password !== password) throw new Error('كلمة المرور غير صحيحة');
    if(userData.isBanned) throw new Error('حسابك محظور');
    
    const userObj = {
      id: userId, name: userData.name, username: userData.username,
      avatar: userData.avatar, bio: userData.bio, country: userData.country,
      points: userData.points || 0, balance: userData.balance || 0,
      friends: userData.friends || [], roomCodes: userData.roomCodes || [],
      isBanned: false, isAdmin: userData.isAdmin || false
    };
    
    localStorage.setItem('currentUser', JSON.stringify(userObj));
    showToast('تم تسجيل الدخول بنجاح ✓');
    setTimeout(() => window.location.href = userObj.isAdmin ? 'admin.html' : 'home.html', 1000);
    
  } catch(err) {
    errorEl.textContent = err.message;
    errorEl.classList.add('show');
  } finally {
    loading.classList.remove('show');
  }
}

window.handleRegister = async function(e) {
  e.preventDefault();
  const fullname = document.getElementById('reg-fullname').value.trim();
  const username = document.getElementById('reg-username').value.trim();
  const country = document.getElementById('reg-country').value;
  const password = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm').value;
  const errorEl = document.getElementById('reg-error');
  const loading = document.getElementById('reg-loading');
  
  errorEl.classList.remove('show');
  errorEl.textContent = '';
  
  if(password !== confirm) { errorEl.textContent = 'كلمات المرور غير متطابقة'; errorEl.classList.add('show'); return; }
  if(password.length < 6) { errorEl.textContent = 'كلمة المرور 6 أحرف على الأقل'; errorEl.classList.add('show'); return; }
  
  loading.classList.add('show');
  try {
    const q = query(collection(db, 'users'), where('username', '==', username));
    const snapshot = await getDocs(q);
    if(!snapshot.empty) throw new Error('اسم المستخدم موجود مسبقاً');
    
    const [countryCode, flag] = country.split('|');
    
    const userRef = await addDoc(collection(db, 'users'), {
      name: fullname, username: username, password: password,
      country: countryCode, countryFlag: flag,
      avatar: `https://ui-avatars.com/api/?name=${encodeURIComponent(fullname)}&background=1a73e8&color=fff`,
      bio: '', points: 100, balance: 2, roomCodes: [], friends: [],
      blocked: [], isBanned: false, isAdmin: false,
      createdAt: serverTimestamp(), lastActive: serverTimestamp()
    });
    
    const userObj = {
      id: userRef.id, name: fullname, username: username,
      avatar: `https://ui-avatars.com/api/?name=${encodeURIComponent(fullname)}&background=1a73e8&color=fff`,
      bio: '', country: countryCode, points: 100, balance: 2,
      roomCodes: [], friends: [], isBanned: false, isAdmin: false
    };
    
    localStorage.setItem('currentUser', JSON.stringify(userObj));
    showToast('تم إنشاء الحساب بنجاح 🎉');
    setTimeout(() => window.location.href = 'home.html', 1500);
    
  } catch(err) {
    errorEl.textContent = err.message || 'حدث خطأ';
    errorEl.classList.add('show');
  } finally {
    loading.classList.remove('show');
  }
}
</script>
</body>
</html>
