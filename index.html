<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>عيادة الأثير للبصريات - تسجيل الدخول</title>
  <link rel="manifest" href="/a/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-touch-icon" sizes="192x192" href="icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">  
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <style>
    :root {
      --bg-page: #0b0f19; --bg-main: linear-gradient(135deg, #111827 0%, #0f172a 100%);
      --glass-bg: rgba(30, 41, 59, 0.4); --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      --text-primary: #f8fafc; --text-secondary: #94a3b8;
      --accent-blue: #3b82f6; --accent-red: #ef4444;
      --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: 'Cairo', sans-serif; }
    html, body { height: 100%; background: var(--bg-main); color: var(--text-primary); overflow: hidden; }
    body { display: flex; align-items: center; justify-content: center; padding: 16px; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }
    .login-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 28px 20px; width: 100%; max-width: 380px; box-shadow: var(--glass-shadow); backdrop-filter: blur(12px); text-align: center; }
    .login-card h1 { font-size: 1.3rem; margin-bottom: 20px; font-weight: 700; }
    .form-group { margin-bottom: 14px; text-align: right; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: var(--text-secondary); }
    .form-group input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-primary); font-size: 1rem; outline: none; transition: 0.2s; }
    .form-group input:focus { border-color: var(--accent-blue); }
    .btn-login { width: 100%; padding: 13px; background: var(--accent-blue); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-login:active { transform: scale(0.97); }
    .error-msg { color: var(--accent-red); font-size: 0.8rem; margin-top: 10px; min-height: 18px; }
    html.light-mode { --bg-page: #f0f9ff; --bg-main: radial-gradient(circle at 50% -20%, #f0f9ff 0%, #e0f2fe 100%) !important; --glass-bg: rgba(255,255,255,0.75) !important; --glass-border: rgba(59,130,246,0.2) !important; --text-primary: #1e293b !important; --text-secondary: #64748b !important; }
    html.light-mode input { background: rgba(59,130,246,0.05) !important; color: #1e293b !important; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>نظام التميز</h1>
    <form id="loginForm">
      <div class="form-group"><label>اسم المستخدم</label><input type="text" id="username" placeholder="admin" required></div>
      <div class="form-group"><label>كلمة المرور</label><input type="password" id="password" placeholder="••••••" required></div>
    <button type="submit" class="btn-login">تسجيل الدخول</button>
      <button type="button" id="installBtn" class="btn-login" style="margin-top:10px; background:#10b981; display:none;">تثبيت التطبيق</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
  </div>
  <script>
    // PWA Service Worker & Install
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/a/sw.js')
          .then(reg => console.log('SW registered'))
          .catch(err => console.log('SW failed', err));
      });
    }
    
   window.addEventListener('beforeinstallprompt', (e) => {
e.preventDefault();
deferredPrompt = e;

document.getElementById('installBtn').style.display='block';
});
    
    function installApp() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choice) => {
          deferredPrompt = null;
        });
      }
    }
    
    if(localStorage.getItem('isLoggedIn') === 'true') window.location.href = '/a/home.html';
    if(localStorage.getItem('darkMode') === 'false') document.documentElement.classList.add('light-mode');
    document.getElementById('loginForm').addEventListener('submit', e => {
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      if(u === 'admin' && p === '123456') {
        localStorage.setItem('isLoggedIn', 'true');
        window.location.href = '/a/home.html';
      } else {
        document.getElementById('errorMsg').textContent = 'بيانات الدخول غير صحيحة';
        document.getElementById('password').value = '';
      }
    });
    
    document.getElementById('installBtn').addEventListener('click', installApp);
    window.addEventListener('appinstalled', () => {
      console.log('App installed');
    });
  </script>
</body>
</html>
