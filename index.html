<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>نظام التميز - تسجيل الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link rel="manifest" href="/manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="نظام التميز">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="manifest" href="/manifest.json">
  <style>
    :root {
      --bg-page: #0b0f19; --bg-main: linear-gradient(135deg, #111827 0%, #0f172a 100%);
      --glass-bg: rgba(30, 41, 59, 0.4); --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      --text-primary: #f8fafc; --text-secondary: #94a3b8; --text-muted: #64748b;
      --accent-blue: #3b82f6; --accent-green: #22c55e; --accent-red: #ef4444; --accent-purple: #a855f7;
      --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    .custom-select { position: relative; width: 100%; font-family: 'Cairo', sans-serif; }
.select-trigger {
  width: 100%; padding: 12px 14px; background: var(--glass-bg);
  border: 1px solid var(--glass-border); border-radius: 10px;
  color: var(--text-primary); display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; user-select: none; transition: 0.2s;
}
/* منع السحب للتحديث (Pull-to-Refresh) */
html, body { overscroll-behavior-y: none; }

/* تحسين التمرير السريع (Native Momentum) */
* { -webkit-overflow-scrolling: touch; }

/* أحجام أزرار صديقة للمس */
button, .btn, select, input, .action-btn { min-height: 44px; }

/* إزالة التظليل الأزرق عند النقر على الموبايل */
* { -webkit-tap-highlight-color: transparent; }

/* دعم الشاشات ذات النوتش */
.safe-top { padding-top: env(safe-area-inset-top); }
.safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
.select-trigger:active { transform: scale(0.98); }
.select-options {
  position: absolute; bottom: 110%; left: 0; right: 0;
  background: #1e293b; border: 1px solid var(--glass-border);
  border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  display: none; overflow: hidden; z-index: 100;
  animation: slideUp 0.25s ease;
}
.select-options.show { display: block; }
.select-options div {
  padding: 12px 16px; cursor: pointer; transition: 0.2s;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.select-options div:active, .select-options div.selected { background: var(--accent-blue); color: #fff; }
.select-options div:last-child { border-bottom: none; }
@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* دعم الوضع الفاتح */
html.light-mode .select-options { background: #fff; color: #1e293b; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: 'Cairo', sans-serif; }
    html, body { height: 100%; background: var(--bg-main); color: var(--text-primary); overflow-x: hidden; }
    .login-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle at 50% 0%, rgba(59,130,246,0.15), transparent 60%); }
    .login-card { width: 100%; max-width: 400px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 28px; box-shadow: var(--glass-shadow); backdrop-filter: blur(12px); text-align: center; }
    .login-header .logo-icon { font-size: 48px; color: var(--accent-blue); margin-bottom: 8px; }
    .login-header h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
    .login-header p { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 20px; }
    .form-group { text-align: right; margin-bottom: 14px; position: relative; }
    .form-label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: var(--text-primary); }
    .form-input { width: 100%; padding: 12px 14px; background: rgba(15,23,42,0.6); border: 1px solid var(--glass-border); border-radius: 10px; color: var(--text-primary); font-size: 0.95rem; outline: none; transition: 0.2s; }
    .form-input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
    .password-wrapper { position: relative; }
    .toggle-pass { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: 600; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; margin-bottom: 10px; }
    .btn:active { transform: scale(0.98); }
    .btn-login { background: var(--accent-blue); color: #fff; box-shadow: 0 4px 12px rgba(59,130,246,0.3); }
    .error-msg { padding: 10px; border-radius: 8px; margin-bottom: 14px; font-size: 0.9rem; display: none; animation: shake 0.4s ease-in-out; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    .error-msg.fail { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: var(--accent-red); }
    .error-msg.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: var(--accent-green); }
.theme-switch { margin-top: 16px; padding-top: 14px; border-top: 1px dashed var(--glass-border); display: flex; justify-content: center; }
    .theme-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 8px; padding: 6px 10px; color: var(--text-primary); cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 0.85rem; }
    .btn-guest { background: linear-gradient(135deg, rgba(168,85,247,0.3), rgba(168,85,247,0.1)); border: 1px solid rgba(168,85,247,0.4); color: #a855f7; }
    .btn-guest:hover { background: linear-gradient(135deg, rgba(168,85,247,0.5), rgba(168,85,247,0.2)); box-shadow: 0 4px 16px rgba(168,85,247,0.3); }
    .light-mode-icon { display: none; }
    html.light-mode { --bg-page: #f0f9ff; --bg-main: radial-gradient(circle at 50% -20%, #f0f9ff 0%, #e0f2fe 100%) !important; --glass-bg: rgba(255,255,255,0.75) !important; --glass-border: rgba(59,130,246,0.2) !important; --glass-shadow: 0 4px 15px rgba(59,130,246,0.08), inset 0 1px 1px rgba(59,130,246,0.1) !important; --text-primary: #1e293b !important; --text-secondary: #64748b !important; --text-muted: rgba(30,41,59,0.5) !important; }
    html.light-mode body { background: var(--bg-main); }
    html.light-mode .login-card { background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(240,248,255,0.9) 100%) !important; border-color: rgba(59,130,246,0.2) !important; }
    html.light-mode .form-input { background: rgba(59,130,246,0.05) !important; border-color: rgba(59,130,246,0.2) !important; color: #1e293b !important; }
    html.light-mode .theme-btn { background: rgba(59,130,246,0.08) !important; border-color: rgba(59,130,246,0.2) !important; color: #1e293b !important; }
    html.light-mode .light-mode-icon { display: inline-block !important; }
    html.light-mode .dark-mode-icon { display: none !important; }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <span class="material-icons-round logo-icon">account_circle</span>
        <h1>نظام التميز</h1>
        <p>سجّل الدخول للمتابعة</p>
      </div>
      <div id="errorMsg" class="error-msg"></div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">رقم الهاتف أو اسم المستخدم</label>
          <input type="text" id="username" class="form-input" placeholder="أدخل رقم الهاتف أو الاسم" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label class="form-label">كلمة المرور</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="form-input" placeholder="••••••" required>
            <span class="toggle-pass material-icons-round" onclick="togglePass()">visibility</span>
          </div>
        </div>
        <button type="submit" class="btn btn-login"><span class="material-icons-round">login</span> تسجيل الدخول</button>
      </form>
<div class="theme-switch">
        <button class="theme-btn" onclick="toggleDarkMode()"><span class="material-icons-round dark-mode-icon">light_mode</span><span class="material-icons-round light-mode-icon">dark_mode</span> تبديل الوضع</button>
      </div>
      
      <!-- زر الدخول كزائر -->
      <div class="guest-section" style="margin-top: 16px; padding-top: 14px; border-top: 1px dashed var(--glass-border);">
        <button class="btn btn-guest" onclick="loginAsGuest()">
          <span class="material-icons-round">person_outline</span> دخول كزائر
        </button>
        <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 8px;">
          🎫allows you to add one customer,one guarantor, one material, and one installment only
        </p>
      </div>
    </div>
  </div>

<script>
  // PWA - زر تثبيت التطبيق
  let deferredPrompt;
  const installBtn = document.createElement('button');
  installBtn.id = 'installBtn';
  installBtn.className = 'btn btn-install';
  installBtn.innerHTML = '<span class="material-icons-round">download</span> ثبت التطبيق';
  installBtn.style.cssText = 'position:fixed;bottom:90px;left:16px;z-index:1000;background:var(--accent-green);color:#fff;border:none;border-radius:50px;padding:12px 20px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(34,197,94,0.4);display:none;align-items:center;gap:8px;animation:slideUp 0.3s ease;font-family:Cairo,sans-serif;';

  // استماع لحدث التثبيت
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    // إظهار الزر بعد تسجيل الدخول
    if(localStorage.getItem('currentUser')) {
      installBtn.style.display = 'flex';
      document.body.appendChild(installBtn);
    }
  });

  // عند الضغط على زر التثبيت
  installBtn.addEventListener('click', async () => {
    if(deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if(outcome === 'accepted') {
        installBtn.style.display = 'none';
      }
      deferredPrompt = null;
    }
  });

  // تشغيل عند تحميل الصفحة
  document.addEventListener('DOMContentLoaded', () => {
    if(localStorage.getItem('darkMode') === 'false') document.documentElement.classList.add('light-mode');
    
    // إذا كان المستخدم مسجلاً بالفعل، يدخل مباشرة
    const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
    if(currentUser && currentUser !== 'null' && currentUser.role) {
      window.location.href = 'home.html';
    } else {
      // إظهار زر التثبيت للزوار
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'flex';
        document.body.appendChild(installBtn);
      });
    }
  });

  // ✅ دالة تسجيل الدخول المتصلة بالسيرفر
  async function handleLogin(e) {
    e.preventDefault();
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    const errDiv = document.getElementById('errorMsg');
    errDiv.style.display = 'none';

    try {
      const response = await fetch('/api/login.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include', // مهم جداً لحفظ الجلسة (Session)
        body: JSON.stringify({ username: u, password: p })
      });
      const result = await response.json();

      if (result.success) {
        localStorage.setItem('currentUser', JSON.stringify(result.user));
        errDiv.className = 'error-msg success';
        errDiv.innerHTML = '✅ جاري الدخول...';
        errDiv.style.display = 'block';
        setTimeout(() => { window.location.href = 'home.html'; }, 800);
      } else {
        errDiv.className = 'error-msg fail';
        errDiv.innerHTML = '❌ ' + (result.message || 'خطأ في تسجيل الدخول');
        errDiv.style.display = 'block';
      }
    } catch (error) {
      errDiv.className = 'error-msg fail';
      errDiv.innerHTML = '❌ خطأ في الاتصال بالسيرفر. تأكد من رفع ملفات api/';
      errDiv.style.display = 'block';
    }
  }

  // دوال واجهة بسيطة
  function togglePass() {
    const p = document.getElementById('password');
    const i = document.querySelector('.toggle-pass');
    p.type = p.type === 'password' ? 'text' : 'password';
    i.textContent = p.type === 'password' ? 'visibility' : 'visibility_off';
  }

function toggleDarkMode() {
    document.documentElement.classList.toggle('light-mode');
    localStorage.setItem('darkMode', document.documentElement.classList.contains('light-mode') ? 'false' : 'true');
  }

  // ✅ دخول كزائر
  async function loginAsGuest() {
    const errDiv = document.getElementById('errorMsg');
    errDiv.style.display = 'none';
    
    try {
      const response = await fetch('/api/guest.php', {
        method: 'GET',
        credentials: 'include'
      });
      const result = await response.json();
      
      if (result.success) {
        localStorage.setItem('currentUser', JSON.stringify(result.user));
        errDiv.className = 'error-msg success';
        errDiv.innerHTML = '✅ جاري الدخول كزائر...';
        errDiv.style.display = 'block';
        setTimeout(() => { window.location.href = 'home.html'; }, 800);
      } else {
        errDiv.className = 'error-msg fail';
        errDiv.innerHTML = '❌ ' + (result.message || 'خطأ في الدخول كزائر');
        errDiv.style.display = 'block';
      }
    } catch (error) {
      errDiv.className = 'error-msg fail';
      errDiv.innerHTML = '❌ خطأ في الاتصال. تأكد من رفع ملفات api/guest.php';
      errDiv.style.display = 'block';
    }
  }
</script>
</body>
</html>
